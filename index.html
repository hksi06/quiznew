<!DOCTYPE html>
<html lang="ja">

  <style>
    :root{

    *{box-sizing:border-box}

    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

    label{display:block;font-weight:600;margin-bottom:6px}
    input[type="text"], input[type="number"], select, textarea, input[type="file"]{
      width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;background:#fff
    }
    textarea{min-height:220px;resize:vertical}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button,.buttonlink{
      border:none;background:var(--primary);color:#fff;border-radius:14px;padding:11px 16px;
      font:inherit;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block
    }
    button.secondary,.buttonlink.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    button.ghost,.buttonlink.ghost{background:#eef2ff;color:#1e3a8a}
    button:disabled{opacity:.55;cursor:not-allowed}
    .pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:700;margin-right:8px}
    .alert{border-radius:14px;padding:12px 14px;border:1px solid var(--line);background:#fff}
    .alert.error{background:var(--red-soft);color:#7f1d1d;border-color:#fecaca}
    .alert.info{background:var(--primary-soft);color:#1e3a8a;border-color:#bfdbfe}
    .alert.ok{background:var(--green-soft);color:#14532d;border-color:#bbf7d0}
    .switches{display:grid;gap:12px}
    .switchrow{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
    .question{margin-bottom:16px}
    .selected-for-regeneration{border-color:#bfdbfe;box-shadow:0 0 0 2px #dbeafe inset}
    .option{border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-top:10px;background:#fff;transition:.15s ease}
    .option:hover{border-color:#c7d2fe}
    .option.selected{border-color:#93c5fd;background:#f8fbff}
    .option.correct{border-color:#86efac;background:#f0fdf4}
    .option.wrong{border-color:#fca5a5;background:#fef2f2}
    .feedback{margin-top:12px;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fafafa}
    .feedback.correct{background:var(--green-soft);border-color:#bbf7d0}
    .feedback.incorrect{background:var(--amber-soft);border-color:#fde68a}
    .small{font-size:14px}
    .topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}
    .dropzone{border:2px dashed #bfdbfe;border-radius:16px;padding:18px;text-align:center;background:#f8fbff;transition:.15s ease}
    .dropzone.drag{background:#eff6ff;border-color:#60a5fa}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .list-head,.list-row{display:grid;grid-template-columns:1.3fr .9fr .8fr auto;gap:12px;align-items:center}
    .list-head{padding:0 6px 10px 6px;color:var(--muted);font-size:13px;font-weight:700}
    .list-row{padding:12px 6px;border-top:1px solid var(--line)}
    .promptbox{margin-top:14px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fafafa}
    .promptbox summary{cursor:pointer;font-weight:700}
    .review-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}
    .review-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .review-panel{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fafafa}
    .review-panel h4{margin:0 0 10px 0;font-size:16px}
    .review-option{padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-top:8px}
    .review-option.correct{border-color:#86efac;background:#f0fdf4}
    .review-note{min-height:96px}
    .review-addendum{min-height:84px}
    .section-spacer{margin-top:16px}
    @media (max-width:900px){
      .list-head{display:none}
      .list-row{grid-template-columns:1fr;gap:8px}
    }
  </style>
</head>

function escapeHtml(s=''){ return s.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function norm(s=''){ return s.toLowerCase().replace(/[\s_\-・（）()]/g,'').replace(/：/g,'').trim(); }
function slugify(s=''){
  return s.toLowerCase().normalize('NFKD').replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,80);
}
function cleanGeneratedMetadataText(s=''){
  return String(s || '').replace(/\s+/g,' ').trim();
}
function normalizeGeneratedTitle(s='', fallbackTitle='Generated Quiz'){
  let text = cleanGeneratedMetadataText(s || fallbackTitle);
  text = text.replace(/^Chapter\s+(\d+)\s*[:\-–—]?\s*/i, 'Ch $1: ');
  text = text.replace(/^Ch\s*(\d+)\s*[:\-–—]?\s*/i, 'Ch $1: ');
  text = text.replace(/\s*[:\-–—]\s*$/, '').trim();
  return text || fallbackTitle;
}
function normalizeGeneratedDescription(s='', fallbackTitle=''){
  let text = cleanGeneratedMetadataText(s || '');
  if(text.includes(' / ')) text = text.split(' / ')[0].trim();
  text = text.replace(/^Chapter\s+\d+\s*[:\-–—]?\s*/i, '');
  text = text.replace(/^Ch\s*\d+\s*[:\-–—]?\s*/i, '');
  text = text.replace(/^Topic\s*[:\-–—]?\s*/i, '');
  text = text.replace(/\.$/, '').trim();
  if(!text && fallbackTitle){
    text = normalizeGeneratedTitle(fallbackTitle).replace(/^Ch\s*\d+\s*[:\-–—]?\s*/i, '').trim();
  }
  return text;
}
function applyGeneratedMetadata(meta, fallbackTitle='Generated Quiz'){
  state.title = normalizeGeneratedTitle(meta?.title || '', fallbackTitle);
  state.description = normalizeGeneratedDescription(meta?.description || '', state.title);
}
function mergeExplanationText(base='', addendum=''){
  const baseText = String(base || '').trim();
  const addendumText = String(addendum || '').trim();
  if(baseText && addendumText) return `${baseText}\n\n${addendumText}`;
  return baseText || addendumText;
}
function getPreviewExplanationAddendum(q, language='en'){
  return language === 'ja' ? (q.explanation_addendum_ja || '') : (q.explanation_addendum_en || '');
}
function getPreviewExplanationText(q, language='en'){
  const base = language === 'ja' ? (q.explanation_ja || '') : (q.explanation_en || '');
  return mergeExplanationText(base, getPreviewExplanationAddendum(q, language));
}
function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

  const h = headers.map(norm);

    no: idx("No","番号","questionno"),

    a: idx("Option A","A","選択肢A"),

    c: idx("Option C","C","選択肢C"),
    d: idx("Option D","D","選択肢D"),
    correct: idx("Correct Answer","Correct","Answer","正答","正解","解答"),
    explanation: idx("Explanation","解説","Feedback","Answer feedback"),
    aexp: idx("Option A Explanation","A Explanation","Option A Note","A Note","選択肢A解説","選択肢Aの解説"),
    bexp: idx("Option B Explanation","B Explanation","Option B Note","B Note","選択肢B解説","選択肢Bの解説"),
    cexp: idx("Option C Explanation","C Explanation","Option C Note","C Note","選択肢C解説","選択肢Cの解説"),
    dexp: idx("Option D Explanation","D Explanation","Option D Note","D Note","選択肢D解説","選択肢Dの解説"),
    excerpt: idx("Supporting Excerpt","Excerpt","根拠","根拠本文抜粋","本文抜粋"),
  };
  const required = ["q","a","b","c","d","correct"].filter(k=>map[k]===-1);
  if(required.length) throw new Error("必要な列が見つかりません: " + required.join(", "));
  return lines.slice(1).map((line,i)=>{
    const cells = line.split("\t");
    const correct = ((cells[map.correct]||"").trim().toUpperCase());
    if(!["A","B","C","D"].includes(correct)) throw new Error((i+2)+"行目の正答がA/B/C/Dになっていません。");
    return {
      id: (cells[map.no]||String(i+1)).trim(),
      question: (cells[map.q]||"").trim(),
      options: { A:(cells[map.a]||"").trim(), B:(cells[map.b]||"").trim(), C:(cells[map.c]||"").trim(), D:(cells[map.d]||"").trim() },
      correct,
      explanation: map.explanation>=0 ? (cells[map.explanation]||"").trim() : "",
      optionExplanations: {
        A: map.aexp>=0 ? (cells[map.aexp]||"").trim() : "",
        B: map.bexp>=0 ? (cells[map.bexp]||"").trim() : "",
        C: map.cexp>=0 ? (cells[map.cexp]||"").trim() : "",
        D: map.dexp>=0 ? (cells[map.dexp]||"").trim() : "",
      },
      excerpt: map.excerpt>=0 ? (cells[map.excerpt]||"").trim() : "",
    };
  }).filter(r => r.question && r.options.A && r.options.B && r.options.C && r.options.D);
}
function buildQuestions(questions, shuffleQ, shuffleC){
  let qs = questions.map(q=>{
    let entries = Object.entries(q.options).map(([k,v])=>({orig:k, text:v}));
    if(shuffleC) entries = shuffleArray(entries);
    const displayOptions = {}, map = {}, displayOptionExplanations = {};
    ["A","B","C","D"].forEach((key, idx)=>{
      displayOptions[key]=entries[idx].text;
      map[key]=entries[idx].orig;
      displayOptionExplanations[key] = (q.optionExplanations && q.optionExplanations[entries[idx].orig]) || q[`optionExplanation${entries[idx].orig}`] || '';
    });
    const displayCorrect = Object.keys(map).find(k => map[k]===q.correct) || q.correct;
    return {...q, displayOptions, displayCorrect, displayOptionExplanations};
  });
  if(shuffleQ) qs = shuffleArray(qs);
  return qs;
}

function isAllCapsHeading(line=''){
  const s = line.trim();
  if (!s) return false;
  if (s.length < 4 || s.length > 120) return false;
  if (!/[A-Z]/.test(s)) return false;
  return /^[A-Z0-9 ,;:'"()\/\-\u2019&.]+$/.test(s);
}
function splitIntoSections(text=''){
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  const sections = [];
  let current = [];
  for (const line of lines) {
    if (isAllCapsHeading(line) && current.length) {
      sections.push(current.join("\n").trim());
      current = [line];
    } else {
      current.push(line);
    }
  }
  if (current.length) sections.push(current.join("\n").trim());
  return sections.filter(Boolean);
}
const EXCLUDED_SECTION_HEADINGS = [
  'REFERENCES',
  'REFERENCE',
  'BIBLIOGRAPHY',
  'FURTHER READING',
  'SUGGESTED READING',
  'CLIENT INFORMATION',
  'CLIENT INFORMATION SHEET',
  'ACKNOWLEDGMENTS',
  'ACKNOWLEDGEMENTS',
  'AUTHOR INFORMATION',
  'AUTHOR AFFILIATIONS',
];
function normalizeHeadingForMatch(s=''){
  return s.toUpperCase().replace(/[^A-Z0-9]+/g, ' ').trim();
}
function isExcludedSectionHeading(line=''){
  const normalized = normalizeHeadingForMatch(line);
  if (!normalized) return false;
  return EXCLUDED_SECTION_HEADINGS.some(head => normalized === head || normalized.startsWith(head + ' '));
}
function preprocessSourceText(text=''){
  const clean = String(text || '').replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
  if (!clean) return '';

  const sections = splitIntoSections(clean);
  if (sections.length > 1) {
    return sections
      .filter(section => {
        const firstLine = (section.split("\n").find(line => line.trim()) || '').trim();
        return !isExcludedSectionHeading(firstLine);
      })
      .join("\n\n")
      .trim();
  }

  const lines = clean.split("\n");
  const firstExcludedIndex = lines.findIndex(line => isExcludedSectionHeading(line));
  if (firstExcludedIndex >= 0) {
    return lines.slice(0, firstExcludedIndex).join("\n").trim();
  }

  return clean;
}
function splitLargeTextFallback(text, maxChars){
  const paragraphs = text.split(/\n{2,}/).map(s=>s.trim()).filter(Boolean);
  if (paragraphs.length === 0) return [text];
  const chunks = [];
  let current = "";
  for (const p of paragraphs) {
    const candidate = current ? `${current}\n\n${p}` : p;
    if (candidate.length <= maxChars || !current) {
      current = candidate;
    } else {
      chunks.push(current);
      current = p;
    }
  }
  if (current) chunks.push(current);
  return chunks;
}
function splitSourceIntoChunks(sourceText, questionCount){
  const clean = sourceText.trim();
  const maxChars = questionCount > 10 ? 9000 : 12000;

  let sections = splitIntoSections(clean);
  if (sections.length <= 1) {
    sections = splitLargeTextFallback(clean, maxChars);
  }

  let chunks = [];
  let current = "";

  for (const section of sections) {
    const candidate = current ? `${current}\n\n${section}` : section;
    if (candidate.length <= maxChars || !current) {
      current = candidate;
    } else {
      chunks.push(current);
      current = section;
    }
  }
  if (current) chunks.push(current);

  if (chunks.length === 1 && clean.length > maxChars) {
    chunks = splitLargeTextFallback(clean, maxChars);
  }

  while (chunks.length > questionCount) {
    const last = chunks.pop();
    chunks[chunks.length - 1] = `${chunks[chunks.length - 1]}\n\n${last}`;
  }

  return chunks.filter(Boolean);
}
function allocateQuestions(total, chunks){
  const n = chunks.length;
  if (n === 1) return [total];
  const lengths = chunks.map(c => Math.max(c.length, 1));
  const sum = lengths.reduce((a,b)=>a+b,0);

  let alloc = new Array(n).fill(1);
  let remaining = total - n;

  if (remaining < 0) {
    return new Array(total).fill(1);
  }

  const exactExtras = lengths.map(len => (len / sum) * remaining);
  const floorExtras = exactExtras.map(x => Math.floor(x));
  alloc = alloc.map((v, i) => v + floorExtras[i]);
  let distributed = floorExtras.reduce((a,b)=>a+b,0);
  let leftovers = remaining - distributed;

  const order = exactExtras
    .map((x, i) => ({ i, frac: x - Math.floor(x) }))
    .sort((a,b) => b.frac - a.frac);

  let idx = 0;
  while (leftovers > 0) {
    alloc[order[idx % order.length].i] += 1;
    leftovers -= 1;
    idx += 1;
  }

  return alloc;
}

function clampNumber(value, min, max){
  return Math.max(min, Math.min(max, value));
}
function estimateWordCountFromCleanText(clean=''){
  const text = String(clean || '').trim();
  if(!text) return 0;
  const latinTokens = text.match(/[A-Za-z0-9]+(?:['’.-][A-Za-z0-9]+)*/g) || [];
  const whitespaceWords = text.split(/\s+/).filter(Boolean).length;
  const japaneseChars = (text.match(/[぀-ヿ㐀-鿿]/g) || []).length;
  const japaneseApproxWords = japaneseChars ? Math.round(japaneseChars / 2.5) : 0;
  return Math.max(latinTokens.length, whitespaceWords, japaneseApproxWords);
}
function getQuestionCountMetrics(text=''){
  const raw = String(text || '').trim();
  const cleanedText = preprocessSourceText(raw);
  const estimatedWords = estimateWordCountFromCleanText(cleanedText);
  const recommended = cleanedText ? clampNumber(Math.round(estimatedWords / 333), 5, 20) : 10;
  return {
    cleanedText,
    estimatedWords,
    recommended,
    removedChars: Math.max(0, raw.length - cleanedText.length),
  };
}
function questionCountHintHtml(metrics){
  if(!metrics.cleanedText){
    return '本文を貼り付けると、参考文献などを除いた本文量から推奨問題数を自動計算します。';
  }
  return `本文推定語数: <span class="mono">${metrics.estimatedWords.toLocaleString('en-US')}</span> words ・ 推奨: <span class="mono">${metrics.recommended}</span>問`;
}

function getBuilderRedirectUrl(){

}

function getBrowserSupabaseClient(){
  if(!window.supabase || typeof window.supabase.createClient !== 'function'){
    throw new Error('Supabase Auth client を読み込めませんでした。');
  }
  if(!browserSupabaseClient){
    browserSupabaseClient = window.supabase.createClient(getSupabaseBaseUrl(), state.supabaseKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
      },
    });
  }
  return browserSupabaseClient;
}

async function getBuilderSession(){
  const supabase = getBrowserSupabaseClient();
  const { data, error } = await supabase.auth.getSession();
  if(error) throw error;
  return data.session || null;
}

async function getBuilderAccessToken(){
  if(state.authAccessToken) return state.authAccessToken;
  const session = await getBuilderSession();
  state.authAccessToken = session?.access_token || '';
  if(session?.user){
    state.authUser = session.user;
    if(session.user.email) state.authEmail = session.user.email;
  }
  return state.authAccessToken;
}

async function syncBuilderAuthState(){
  if(state.mode === 'solver') return;
  try{
    const session = await getBuilderSession();
    state.authUser = session?.user || null;
    state.authAccessToken = session?.access_token || '';
    state.authEmail = state.authUser?.email || state.authEmail || '';
    state.authError = '';
  }catch(err){
    state.authUser = null;
    state.authAccessToken = '';
    state.authError = err?.message || 'ログイン状態の確認に失敗しました。';
  }
  state.authReady = true;
}

function attachBuilderAuthListener(){
  if(authListenerAttached || state.mode === 'solver') return;
  const supabase = getBrowserSupabaseClient();
  supabase.auth.onAuthStateChange((_event, session)=>{
    state.authUser = session?.user || null;
    state.authAccessToken = session?.access_token || '';
    if(state.authUser?.email) state.authEmail = state.authUser.email;
    state.authReady = true;
    state.authError = '';

    setTimeout(async ()=>{
      if(state.mode === 'builder' && state.authUser){
        try{
          await refreshQuizList();
        }catch(e){
          state.listStatus = e.message || '一覧の読み込みに失敗しました。';
          render();
        }
      }else if(state.mode === 'builder'){
        state.quizList = [];
        state.listStatus = '';
        render();
      }else{
        render();
      }
    }, 0);
  });
  authListenerAttached = true;
}

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {

      emailRedirectTo: getBuilderRedirectUrl(),

function getDefaultSystemPromptForLanguage(lang='ja'){
  return lang === 'en' ? DEFAULT_SYSTEM_PROMPT_EN : DEFAULT_SYSTEM_PROMPT_JA;
}

function getDefaultPromptTemplateForLanguage(lang='ja'){
  return lang === 'en' ? DEFAULT_PROMPT_TEMPLATE_EN : DEFAULT_PROMPT_TEMPLATE_JA;
}

function getPromptFieldKey(kind='system', lang='ja'){
  const suffix = lang === 'en' ? 'En' : 'Ja';
  return `${kind === 'template' ? 'promptTemplate' : 'systemPrompt'}${suffix}`;
}

function syncActivePromptFromLanguage(){
  const lang = state.promptLanguage === 'en' ? 'en' : 'ja';
  state.promptLanguage = lang;
  state.systemPrompt = state[getPromptFieldKey('system', lang)] || getDefaultSystemPromptForLanguage(lang);
  state.promptTemplate = state[getPromptFieldKey('template', lang)] || getDefaultPromptTemplateForLanguage(lang);
}

function updatePromptField(lang='ja', kind='system', value=''){
  const key = getPromptFieldKey(kind, lang);
  state[key] = String(value || '');
  if((state.promptLanguage || DEFAULT_PROMPT_LANGUAGE) === lang){
    syncActivePromptFromLanguage();
  }
  syncPromptMode();
}

function setPromptLanguage(lang='ja'){
  state.promptLanguage = lang === 'en' ? 'en' : 'ja';
  syncActivePromptFromLanguage();
  syncPromptMode();
}

function resetPromptSettingsToDefaults(){
  state.systemPromptJa = DEFAULT_SYSTEM_PROMPT_JA;
  state.promptTemplateJa = DEFAULT_PROMPT_TEMPLATE_JA;
  state.systemPromptEn = DEFAULT_SYSTEM_PROMPT_EN;
  state.promptTemplateEn = DEFAULT_PROMPT_TEMPLATE_EN;
  if(!state.promptLanguage) state.promptLanguage = DEFAULT_PROMPT_LANGUAGE;
  syncActivePromptFromLanguage();
  syncPromptMode();
}

function guessPromptLanguage(systemPrompt='', promptTemplate=''){
  const text = `${systemPrompt || ''}
${promptTemplate || ''}`;
  const jaCount = (text.match(/[ぁ-んァ-ヶー一-龠々]/g) || []).length;
  const enCount = (text.match(/[A-Za-z]/g) || []).length;
  return jaCount > (enCount * 0.55) ? 'ja' : 'en';
}

function isPromptSettingsDefaultForLanguage(lang='ja'){
  return (state[getPromptFieldKey('system', lang)] || '') === getDefaultSystemPromptForLanguage(lang)
    && (state[getPromptFieldKey('template', lang)] || '') === getDefaultPromptTemplateForLanguage(lang);
}

function syncPromptMode(){
  syncActivePromptFromLanguage();
  state.promptMode = (isPromptSettingsDefaultForLanguage('ja') && isPromptSettingsDefaultForLanguage('en')) ? 'default' : 'custom';
}

function saveLocal(){
  if(state.mode === 'solver') return;
  syncPromptMode();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    supabaseUrl: state.supabaseUrl,
    supabaseKey: state.supabaseKey,
    shuffleQuestions: state.shuffleQuestions,
    shuffleChoices: state.shuffleChoices,
    promptMode: state.promptMode,
    promptDefaultsVersion: PROMPT_DEFAULTS_VERSION,
    promptLanguage: state.promptLanguage || DEFAULT_PROMPT_LANGUAGE,
    systemPromptJa: state.systemPromptJa || DEFAULT_SYSTEM_PROMPT_JA,
    promptTemplateJa: state.promptTemplateJa || DEFAULT_PROMPT_TEMPLATE_JA,
    systemPromptEn: state.systemPromptEn || DEFAULT_SYSTEM_PROMPT_EN,
    promptTemplateEn: state.promptTemplateEn || DEFAULT_PROMPT_TEMPLATE_EN,
    systemPrompt: state.systemPrompt || DEFAULT_SYSTEM_PROMPT,
    promptTemplate: state.promptTemplate || DEFAULT_PROMPT_TEMPLATE,
    autoSaveLanguage: state.autoSaveLanguage,
    listSort: state.listSort,
    showHidden: state.showHidden,
  }));
}

function loadLocal(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    resetPromptSettingsToDefaults();
    return;
  }
  try{
    const s = JSON.parse(raw);
    state.supabaseUrl = s.supabaseUrl || state.supabaseUrl;
    state.supabaseKey = s.supabaseKey || state.supabaseKey;
    state.shuffleQuestions = !!s.shuffleQuestions;
    state.shuffleChoices = !!s.shuffleChoices;
    state.autoSaveLanguage = s.autoSaveLanguage || 'en';
    state.listSort = s.listSort || 'created_desc';
    state.showHidden = !!s.showHidden;

    if(Number(s.promptDefaultsVersion || 0) === PROMPT_DEFAULTS_VERSION && (s.systemPromptJa || s.promptTemplateJa || s.systemPromptEn || s.promptTemplateEn)){
      state.promptLanguage = s.promptLanguage === 'en' ? 'en' : 'ja';
      state.systemPromptJa = s.systemPromptJa || DEFAULT_SYSTEM_PROMPT_JA;
      state.promptTemplateJa = s.promptTemplateJa || DEFAULT_PROMPT_TEMPLATE_JA;
      state.systemPromptEn = s.systemPromptEn || DEFAULT_SYSTEM_PROMPT_EN;
      state.promptTemplateEn = s.promptTemplateEn || DEFAULT_PROMPT_TEMPLATE_EN;
    }else if(s.promptMode === 'custom' && s.systemPrompt && s.promptTemplate){
      state.promptLanguage = 'en';
      state.systemPromptJa = DEFAULT_SYSTEM_PROMPT_JA;
      state.promptTemplateJa = DEFAULT_PROMPT_TEMPLATE_JA;
      state.systemPromptEn = s.systemPrompt || DEFAULT_SYSTEM_PROMPT_EN;
      state.promptTemplateEn = s.promptTemplate || DEFAULT_PROMPT_TEMPLATE_EN;
    }else{
      resetPromptSettingsToDefaults();
    }
    syncPromptMode();
  }catch(e){
    resetPromptSettingsToDefaults();
  }
}

function applyDraftData(raw={}, { sourceLabel='下書き' } = {}){

  state.shuffleChoices = !!raw.shuffle_choices;
  const restoredPromptLanguage = guessPromptLanguage(raw.system_prompt || '', raw.prompt_template || '') || state.promptLanguage || DEFAULT_PROMPT_LANGUAGE;
  state.promptLanguage = restoredPromptLanguage;
  if(restoredPromptLanguage === 'en'){
    state.systemPromptEn = raw.system_prompt || state.systemPromptEn || DEFAULT_SYSTEM_PROMPT_EN;

  state.reviewNotes = raw.review_notes || {};

}

function loadLocalDraftSnapshotMeta(){
  const raw = localStorage.getItem(DRAFT_SNAPSHOT_KEY);
  if(!raw){
    state.hasLocalSnapshot = false;
    state.snapshotUpdatedAt = '';
    return;
  }
  try{
    const parsed = JSON.parse(raw);
    state.hasLocalSnapshot = !!parsed?.data;
    state.snapshotUpdatedAt = parsed?.saved_at || '';
  }catch(e){
    state.hasLocalSnapshot = false;
    state.snapshotUpdatedAt = '';
  }
}

function discardLocalDraftSnapshot(){
  if(snapshotSaveTimer){
    clearTimeout(snapshotSaveTimer);
    snapshotSaveTimer = null;
  }
  localStorage.removeItem(DRAFT_SNAPSHOT_KEY);
  state.hasLocalSnapshot = false;
  state.snapshotUpdatedAt = '';
}

function persistDraftSnapshotLocal(){
  if(state.mode === 'solver') return false;
  if(!hasDraftContent()){
    discardLocalDraftSnapshot();
    return false;
  }
  const snapshot = {
    saved_at: new Date().toISOString(),
    draft_id: state.draftId || '',
    draft_updated_at: state.draftUpdatedAt || '',
    data: buildDraftPayload(),
  };
  try{
    localStorage.setItem(DRAFT_SNAPSHOT_KEY, JSON.stringify(snapshot));
    state.hasLocalSnapshot = true;
    state.snapshotUpdatedAt = snapshot.saved_at;
    return true;
  }catch(e){
    state.hasLocalSnapshot = false;
    state.snapshotUpdatedAt = '';
    return false;
  }
}

function scheduleDraftSnapshotSave(){
  if(state.mode === 'solver') return;
  if(snapshotSaveTimer) clearTimeout(snapshotSaveTimer);
  snapshotSaveTimer = setTimeout(()=>{
    snapshotSaveTimer = null;
    try{ persistDraftSnapshotLocal(); }catch(_e){}
  }, 400);
}

function restoreLocalDraftSnapshot(){
  const raw = localStorage.getItem(DRAFT_SNAPSHOT_KEY);
  if(!raw) throw new Error('復元できる local snapshot が見つかりませんでした。');
  let parsed;
  try{
    parsed = JSON.parse(raw);
  }catch(e){
    throw new Error('local snapshot の内容を読み込めませんでした。');
  }
  if(!parsed?.data) throw new Error('local snapshot の内容を読み込めませんでした。');
  applyDraftData({
    ...parsed.data,
    draft_id: parsed.draft_id || '',
    draft_updated_at: parsed.draft_updated_at || '',
  }, { sourceLabel:'local snapshot' });
  state.draftStatus = 'local snapshot を復元しました。';
  state.draftError = '';
  state.hasLocalSnapshot = true;
  state.snapshotUpdatedAt = parsed.saved_at || '';
  persistDraftSnapshotLocal();
}

const DUPLICATE_FIX_MAX_ROUNDS = 2;
const DUPLICATE_FIX_MAX_ITEMS_PER_ROUND = 3;
const DUPLICATE_SIMILARITY_STOPWORDS = new Set([
  'which','what','statement','following','regarding','about','concerning','most','least','likely','appropriate','correct','incorrect','best','true','false','describes','description','described','identify','identifies','identified','choose','select','item','items','question','questions','option','options','is','are','was','were','be','being','been','can','could','should','would','may','might','does','do','did','not','than','then','that','this','these','those','from','with','without','into','onto','upon','during','after','before','within','through','because','while','when','where','who','whom','whose','why','how','for','and','or','but','the','a','an','of','to','in','on','by','as','at','it','its','their','there','such','one','two','three','four'
]);

function normalizeSimilarityText(s=''){
  return String(s || '')
    .toLowerCase()
    .normalize('NFKD')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function tokenizeSimilarityText(s=''){
  return normalizeSimilarityText(s)
    .split(' ')
    .filter(token => token && !DUPLICATE_SIMILARITY_STOPWORDS.has(token) && (token.length >= 3 || /\d/.test(token)));
}

function makeTokenNgrams(tokens, n=2){
  const grams = [];
  if(tokens.length < n) return grams;
  for(let i = 0; i <= tokens.length - n; i++) grams.push(tokens.slice(i, i + n).join(' '));
  return grams;
}

function setJaccard(a, b){
  if(!a.size || !b.size) return 0;
  let intersection = 0;
  for(const value of a){ if(b.has(value)) intersection++; }
  const union = new Set([...a, ...b]).size;
  return union ? (intersection / union) : 0;
}

function getQuestionOptionByLetter(q, letter){
  const key = String(letter || '').toUpperCase();
  if(key === 'A') return q.optionA_en || '';
  if(key === 'B') return q.optionB_en || '';
  if(key === 'C') return q.optionC_en || '';
  if(key === 'D') return q.optionD_en || '';
  return '';
}

function buildQuestionSimilarityProfile(q){
  const stemTokens = tokenizeSimilarityText(q.question_en || '');
  const answerTokens = tokenizeSimilarityText(`${getQuestionOptionByLetter(q, q.correct)} ${(q.excerpt || '')}`);
  return {
    stemNorm: normalizeSimilarityText(q.question_en || ''),
    stemSet: new Set(stemTokens),
    stemBigramSet: new Set(makeTokenNgrams(stemTokens, 2)),
    answerSet: new Set(answerTokens),
    combinedSet: new Set([...stemTokens, ...answerTokens]),
  };
}

function getDuplicateReason(a, b){
  const pa = buildQuestionSimilarityProfile(a);
  const pb = buildQuestionSimilarityProfile(b);
  if(pa.stemNorm && pa.stemNorm === pb.stemNorm) return 'question stem overlap';
  if(pa.stemSet.size < 3 || pb.stemSet.size < 3) return '';

  const stemTokenSim = setJaccard(pa.stemSet, pb.stemSet);
  const stemBigramSim = setJaccard(pa.stemBigramSet, pb.stemBigramSet);
  const answerSim = setJaccard(pa.answerSet, pb.answerSet);
  const combinedSim = setJaccard(pa.combinedSet, pb.combinedSet);

  if(stemBigramSim >= 0.74) return 'very similar stem phrasing';
  if(stemTokenSim >= 0.72 && combinedSim >= 0.58) return 'same learning point phrased differently';
  if(stemTokenSim >= 0.64 && answerSim >= 0.55 && combinedSim >= 0.55) return 'same concept and answer area';
  return '';
}

function findLikelyDuplicatePairs(questions){
  const pairs = [];
  const list = Array.isArray(questions) ? questions.slice().sort((a,b)=>Number(a.no) - Number(b.no)) : [];
  for(let i = 0; i < list.length; i++){
    for(let j = i + 1; j < list.length; j++){
      const reason = getDuplicateReason(list[i], list[j]);
      if(reason){
        pairs.push({
          keepNo: Number(list[i].no),
          replaceNo: Number(list[j].no),
          keepQuestion: list[i],
          replaceQuestion: list[j],
          reason,
        });
      }
    }
  }
  return pairs;
}

async function autoResolveLikelyDuplicateQuestions(allQuestions, sourceText){
  let questions = Array.isArray(allQuestions) ? allQuestions.slice().sort((a,b)=>Number(a.no) - Number(b.no)) : [];
  const cleanedSourceText = preprocessSourceText(sourceText) || sourceText;
  const replacedNos = [];
  const errors = [];

  for(let round = 0; round < DUPLICATE_FIX_MAX_ROUNDS; round++){
    const pairs = findLikelyDuplicatePairs(questions);
    if(!pairs.length) break;

    const targets = [];
    const targetReasons = {};
    for(const pair of pairs){
      if(!targets.includes(pair.replaceNo)){
        targets.push(pair.replaceNo);
        targetReasons[pair.replaceNo] = pair.reason;
      }
      if(targets.length >= DUPLICATE_FIX_MAX_ITEMS_PER_ROUND) break;
    }

    for(const targetNo of targets){
      const original = questions.find(q => Number(q.no) === Number(targetNo));
      if(!original) continue;
      const keptQuestions = questions.filter(q => Number(q.no) !== Number(targetNo));
      const promptTemplate = buildReplacementPromptTemplate([original], keptQuestions, {
        overrideInstructions: {
          [String(targetNo)]: 'Replace this item with a clearly distinct, non-overlapping question. It must test a different learning point from every kept question, not a paraphrase or minor variant. Use a different fact, concept, mechanism, indication, interpretation, definition, timing, severity, or comparison from the source.'
        },
        extraGlobalInstructions: '- Double-check the whole kept set before answering.\n- Any replacement that overlaps with a kept item in concept or tested takeaway is unacceptable, even if the wording differs.',
      });

      try{
        const json = await callGenerateQuizChunk(
          cleanedSourceText || sourceText,
          1,
          `${state.title || 'Generated Quiz'} unique revision`,
          { promptTemplate }
        );
        const candidate = (Array.isArray(json.questions) ? json.questions[0] : null) || {};
        const replacement = {
          ...candidate,
          no: original.no,
          _sourceChunk: cleanedSourceText || sourceText,
          explanation_addendum_en: original.explanation_addendum_en || '',
          explanation_addendum_ja: original.explanation_addendum_ja || '',
        };
        questions = questions
          .map(q => Number(q.no) === Number(targetNo) ? replacement : q)
          .sort((a,b)=>Number(a.no) - Number(b.no));
        replacedNos.push(Number(targetNo));
      }catch(err){
        errors.push(`Q${targetNo}: ${err?.message || err}`);
      }
    }
  }

  return {
    questions,
    replacedNos,
    remainingPairs: findLikelyDuplicatePairs(questions),
    errors,
  };
}

function buildReplacementPromptTemplate(groupQuestions, keptQuestions, options={}){
  const flaggedText = groupQuestions.map(q => {
    const note = (options.overrideInstructions && options.overrideInstructions[String(q.no)]) || (state.reviewNotes[String(q.no)] || '').trim();
    return [
      `Slot ${q.no}`,
      `Current English question: ${compactPromptText(q.question_en, 360)}`,
      `Current Japanese question: ${compactPromptText(q.question_ja, 360)}`,
      `Current correct answer: ${q.correct || ''}`,
      `Current supporting excerpt: ${compactPromptText(q.excerpt || '', 280)}`,
      `Mandatory reviewer instruction: ${note || 'Improve clarity, accuracy, natural wording, and fit to the source text.'}`,
    ].join('\n');
  }).join('\n\n');

  const keptText = keptQuestions.length
    ? keptQuestions.map(q => `- Slot ${q.no}: ${compactPromptText(q.question_en, 260)}`).join('\n')
    : '- None';

  return `You are revising selected questions in a bilingual veterinary textbook quiz.

Follow these rules strictly:
- Use only the provided source text as evidence.
- Do not use outside knowledge.
- Generate exactly {{questionCount}} replacement questions.
- Return the replacement questions in the same order as the flagged slots below.
- Set the "no" field of each returned item to the original slot number shown below.
- Keep the output bilingual in English and Japanese.
- Keep the output schema exactly.
- Do not duplicate the remaining kept questions listed below, including near-duplicates that only rephrase the same learning point.
- Each replacement must test a genuinely distinct learning point from the kept questions, not a paraphrase or minor variation.
- Treat each mandatory reviewer instruction below as a hard requirement.
- If a reviewer instruction conflicts with the current question, rewrite the question so that the instruction is satisfied.
- Do not create questions from reference lists, bibliography entries, author lists, acknowledgments, client information, further reading lists, or citation-only material.
- If the current question appears to be based on citation-only material or a reference list, replace it with a new question based on substantive textbook prose from the source text.
- The question stem should ask what is correct/appropriate, not "which matches the text".
- Questions must read like standalone exam items, not like reading-comprehension questions about a chapter or passage.
- Never mention the chapter, text, textbook, excerpt, passage, source text, 本文, 抜粋文, この章, このチャプター, この教科書, or このテキスト in the question stem or explanation.
- Before finalizing each question, rewrite any text-referential wording into a general-knowledge wording.
- Each question must test a distinct learning point from the source.
- Do not ask the same fact, concept, mechanism, indication, interpretation, definition, or comparison more than once, even with different wording or a different correct option.
- Before finalizing the full set, compare all items and replace any overlapping or near-duplicate question with a different high-yield point from the source.
- Make distractors genuinely competitive:
  - Each incorrect option should sound plausible to a learner with partial understanding.
  - Keep all four options in the same domain, same level of specificity, similar tone, and roughly similar length.
  - Make the four options structurally parallel whenever possible.
  - Do not make the correct answer systematically longer, more qualified, more nuanced, or more information-dense than the distractors.
  - Avoid patterns where one option stands out because it contains extra conditions, extra detail, or noticeably greater precision.
  - If one option needs a qualifier, consider whether comparable qualifiers should be added to the other options so the set remains balanced.
  - Avoid absurd, opposite, unrelated, or giveaway distractors.
  - Avoid options that can be ruled out instantly because they are too broad, too narrow, grammatically mismatched, or stylistically different.
  - Prefer nuanced distinctions in mechanism, indication, interpretation, timing, severity, definition, or comparative appropriateness.
- Do not make an incorrect option wrong mainly because it uses lexical giveaway cues such as "always", "never", "only", "alone", "exclusively", "solely", "entirely", "completely", "all", "none", "must", "impossible", "不要", "必ず", "常に", "のみ", or "だけ".
- An incorrect option must be incorrect for a substantive content reason, not merely because of extreme, absolute, or exclusive wording.
- Before finalizing each item, check whether one option is easier to eliminate because of wording, length, or style; if so, rewrite the full option set to make it more even.
- Include a brief explanation in English and Japanese.
- Include brief choice-by-choice explanations in English and Japanese for options A, B, C, and D, explaining why the correct answer is correct and why each incorrect option is not the best answer.
- Include a short supporting excerpt copied or lightly trimmed from the source text.
${options.extraGlobalInstructions ? options.extraGlobalInstructions.trim() + "\n" : ""}- Return JSON only.

Flagged slots to replace:
${flaggedText}

Remaining kept questions to avoid duplicating:
${keptText}

Source text:
"""{{sourceText}}"""`;
}

async function supabaseRequest(path, {method='GET', body=null, prefer=''}={}){
  const headers = {
    'apikey': state.supabaseKey,
  };

  if(state.mode === 'builder'){
    const accessToken = await getBuilderAccessToken();
    if(!accessToken) throw new Error('Builderを使うには先にログインしてください。');
    headers['Authorization'] = 'Bearer ' + accessToken;
  }else{
    headers['Authorization'] = 'Bearer ' + state.supabaseKey;
  }

  if(body !== null) headers['Content-Type'] = 'application/json';
  if(prefer) headers['Prefer'] = prefer;
  const baseUrl = getSupabaseBaseUrl();
  let res;
  try{
    res = await fetch(baseUrl + path, { method, headers, body: body !== null ? JSON.stringify(body) : undefined });
  }catch(err){
    throw new Error(`Supabaseに接続できませんでした。URL設定またはネットワークを確認してください。 (${baseUrl})`);
  }
  if(!res.ok){
    const text = await res.text();
    throw new Error(`Supabase error ${res.status}: ${text}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function findAvailableSlug(baseSlug){
  const base = baseSlug || slugify(state.title) || 'quiz';
  const query = `/rest/v1/quizzes?select=slug&or=(slug.eq.${encodeURIComponent(base)},slug.like.${encodeURIComponent(base + '-%')})`;
  const existing = await supabaseRequest(query, {method:'GET'});
  const slugs = new Set((existing || []).map(x => x.slug));
  if(!slugs.has(base)) return base;
  let n = 2;
  while(slugs.has(`${base}-${n}`)) n++;
  return `${base}-${n}`;
}

async function saveQuizToSupabase({autoSlug = false, language = 'en'} = {}){
  if(!state.questions.length) throw new Error('先にクイズを生成してください。');

  const languageSuffix = language === 'ja' ? 'ja' : 'en';
  const baseSlugCore = slugify(state.title) || 'quiz';
  let slug = autoSlug
    ? `${baseSlugCore}-${languageSuffix}`
    : (state.slug || `${baseSlugCore}-${languageSuffix}`);

  if(!slug) throw new Error('タイトルを入力してください。');

  if(autoSlug){
    slug = await findAvailableSlug(slug);
  } else {
    const existing = await supabaseRequest(`/rest/v1/quizzes?slug=eq.${encodeURIComponent(slug)}&select=id`, {method:'GET'});
    if(Array.isArray(existing) && existing.length > 0) throw new Error('この slug はすでに存在します。別の slug にしてください。');
  }

  const payload = {
    slug,
    title: state.title,
    description: state.description,
    quiz_data: {
      title: state.title,
      description: state.description,
      language,
      shuffleQuestions: state.shuffleQuestions,
      shuffleChoices: state.shuffleChoices,
      questions: state.questions,
    }
  };

  await supabaseRequest('/rest/v1/quizzes', {method:'POST', body: payload});
  state.slug = slug;
  const link = `${location.origin}${location.pathname}?quiz=${encodeURIComponent(slug)}`;
  state.shareLink = link;
  state.shareLinks[language] = link;
}

async function loadQuizFromSupabase(slug){
  const data = await supabaseRequest(`/rest/v1/quizzes?slug=eq.${encodeURIComponent(slug)}&select=slug,title,description,quiz_data`);
  if(!Array.isArray(data) || data.length === 0) throw new Error('指定されたクイズが見つかりませんでした。');
  const row = data[0];
  const qd = row.quiz_data || {};
  state.mode = 'solver';
  state.title = qd.title || row.title || 'Quiz';

async function saveBuilderDraft(){
  if(!state.authUser) throw new Error('下書きを保存するにはログインしてください。');
  if(!hasDraftContent()) throw new Error('保存する途中データがまだありません。');
  state.draftError = '';
  state.draftStatus = state.draftId ? '下書きを更新中です...' : '下書きを保存中です...';
  render();

  const payload = buildDraftPayload();
  let rows = null;

  if(state.draftId){
    rows = await supabaseRequest(`/rest/v1/quiz_drafts?id=eq.${encodeURIComponent(state.draftId)}&select=id,updated_at`, {
      method:'PATCH',
      body: payload,
      prefer:'return=representation',
    });
    if(!Array.isArray(rows) || rows.length === 0){
      state.draftId = '';
      state.draftUpdatedAt = '';
      rows = null;
    }
  }

  if(!rows){
    rows = await supabaseRequest('/rest/v1/quiz_drafts?select=id,updated_at', {
      method:'POST',
      body: payload,
      prefer:'return=representation',
    });
  }

  const row = Array.isArray(rows) ? rows[0] : rows;
  if(!row?.id) throw new Error('下書き保存後の応答を確認できませんでした。');
  state.draftId = row.id;
  state.draftUpdatedAt = row.updated_at || new Date().toISOString();
  state.draftStatus = 'Supabase に private draft を保存しました。Load latest draft で続きから再開できます。';
  state.draftError = '';
  persistDraftSnapshotLocal();
  render();
}

async function loadLatestBuilderDraft(){

}

async function deleteCurrentBuilderDraft(){

function getFilteredSortedQuizList(){
  const needle = (state.listSearch || '').trim().toLowerCase();

  let items = state.quizList.filter(item=>{
    const meta = getQuizMeta(item.slug);
    if(!state.showHidden && meta.hidden) return false;
    if(!needle) return true;
    const haystack = `${item.title || ''}
${item.slug || ''}
${item.description || ''}`.toLowerCase();
    return haystack.includes(needle);
  });

  items.sort((a,b)=>{
    if(state.listSort === 'created_asc'){
      return new Date(a.created_at || 0) - new Date(b.created_at || 0);
    }
    if(state.listSort === 'title_asc'){
      return String(a.title || '').localeCompare(String(b.title || ''), 'ja');
    }
    if(state.listSort === 'title_desc'){
      return String(b.title || '').localeCompare(String(a.title || ''), 'ja');
    }
    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });

  return items;
}

function buildQuizPublicLink(slug){
  return `${location.origin}${location.pathname}?quiz=${encodeURIComponent(slug || '')}`;

function normalizeClipboardCell(value){
  return String(value || '').replace(/\t/g, ' ').replace(/\r?\n+/g, ' / ').trim();
}

function buildVisibleQuizListTsv(){
  const items = getFilteredSortedQuizList().filter(item=>{
    const meta = getQuizMeta(item.slug);
    return !meta.hidden;
  });
  const header = ['title', 'description', 'url'];
  const rows = items.map(item=>[
    normalizeClipboardCell(item.title || ''),
    normalizeClipboardCell(item.description || ''),
    buildQuizPublicLink(item.slug || ''),
  ]);
  return [header, ...rows].map(cols=>cols.join('\t')).join('\n');
}

function buildSingleQuizCopyText(slug){

async function callGenerateQuizChunk(chunkText, questionCount, title, overrides={}){
  const functionUrl = `${getSupabaseBaseUrl()}/functions/v1/generate_quiz`;
  const accessToken = await getBuilderAccessToken();
  if(!accessToken) throw new Error('AI作問を使うには先にログインしてください。');

  let res;
  try{
    res = await fetch(functionUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': state.supabaseKey,
        'Authorization': 'Bearer ' + accessToken,
      },
      body: JSON.stringify({
        sourceText: chunkText,
        questionCount,
        title,
        metadataOnly: !!overrides.metadataOnly,
        systemPrompt: overrides.systemPrompt || state.systemPrompt || getDefaultSystemPromptForLanguage(state.promptLanguage || DEFAULT_PROMPT_LANGUAGE),
        promptTemplate: overrides.promptTemplate || state.promptTemplate || getDefaultPromptTemplateForLanguage(state.promptLanguage || DEFAULT_PROMPT_LANGUAGE),
      }),
    });
  }catch(err){
    throw new Error(`AI作問APIに接続できませんでした。Supabase URL、Edge Function、またはネットワークを確認してください。 (${functionUrl})`);
  }

  const json = await res.json().catch(()=> ({}));
  if(!res.ok){
    throw new Error(json.detail ? JSON.stringify(json.detail) : (json.error || `AI作問に失敗しました (${res.status})`));
  }
  return json;
}

async function callGenerateQuizMetadata(sourceText){
  return callGenerateQuizChunk(sourceText, 1, 'Generated Quiz', { metadataOnly: true });
}

async function generateQuizWithAI(){
  const rawSourceText = state.sourceText.trim();
  if(!rawSourceText) throw new Error('教科書本文を入力してください。');

  if(state.questionCountMode === 'auto'){
    applyAutoQuestionCount({ force: true });
  }

  const sourceText = preprocessSourceText(rawSourceText);
  if(!sourceText) throw new Error('有効な本文が見つかりませんでした。参考文献や付帯情報ではない本文を入力してください。');

  const removedChars = rawSourceText.length - sourceText.length;
  if (removedChars > 0) {
    state.aiStatus = `参考文献や付帯情報と思われる部分を自動除外しました。${removedChars}文字を除外して作問します...`;
    render();
  }

  const useChunking = sourceText.length > 12000 || Number(state.questionCount) > 10;
  let allQuestions = [];

  state.title = '';
  state.description = '';
  render();

  if (!useChunking) {
    const json = await callGenerateQuizChunk(
      sourceText,
      Number(state.questionCount || 10),
      'Generated Quiz'
    );
    applyGeneratedMetadata(json);
    allQuestions = (Array.isArray(json.questions) ? json.questions : []).map(q => ({ ...q, _sourceChunk: sourceText }));
    state.aiStatus = 'AI作問が完了しました。タイトル・説明を生成し、内容重複も自動チェックしました。レビューしてから保存できます。';
  } else {
    const chunks = splitSourceIntoChunks(sourceText, Number(state.questionCount || 10));
    const allocations = allocateQuestions(Number(state.questionCount || 10), chunks);

    state.aiStatus = '本文からタイトルと説明を生成しています...';
    render();
    const metadata = await callGenerateQuizMetadata(sourceText);
    applyGeneratedMetadata(metadata);

    state.aiStatus = `長文モードで分割生成しています... 0 / ${chunks.length}`;
    render();

    for (let i = 0; i < chunks.length; i++) {
      const qCount = allocations[i];
      state.aiStatus = `長文モードで分割生成しています... ${i + 1} / ${chunks.length}`;
      render();

      const json = await callGenerateQuizChunk(
        chunks[i],
        qCount,
        `${state.title || 'Generated Quiz'} (part ${i + 1})`
      );

      const partQuestions = Array.isArray(json.questions) ? json.questions : [];
      allQuestions.push(...partQuestions.map(q => ({ ...q, _sourceChunk: chunks[i] })));
    }

    allQuestions = allQuestions.slice(0, Number(state.questionCount || 10));
    state.aiStatus = `長文モードでのAI作問が完了しました。${chunks.length}分割を結合し、タイトル・説明も本文から自動生成し、内容重複も自動チェックしました。レビューしてから保存できます。`;
  }

  allQuestions = allQuestions.map((q, i) => ({ ...q, no: i + 1 }));

  state.aiStatus = '内容の重複がないか確認しています...';
  render();
  const duplicateFixResult = await autoResolveLikelyDuplicateQuestions(allQuestions, sourceText);
  allQuestions = duplicateFixResult.questions;

  state.previewQuestions = allQuestions;
  state.questions = [];
  state.shareLink = '';
  state.shareLinks = { en: '', ja: '' };
  state.status = '生成された問題をレビューしてください。レビュー後に英語版URLと日本語版URLをそれぞれ作れます。';
  clearReviewSelections();
  state.reviewError = duplicateFixResult.errors.length ? `重複修正の一部に失敗しました: ${duplicateFixResult.errors.join(' / ')}` : '';
  state.reviewStatus = duplicateFixResult.remainingPairs.length
    ? `内容が近い可能性のある問題がまだ ${duplicateFixResult.remainingPairs.length} 組あります。必要なら個別に作り直してください。`
    : (duplicateFixResult.replacedNos.length
      ? `内容が重複しそうだった問題 ${duplicateFixResult.replacedNos.length} 件を自動で差し替えました。`
      : '問題間の内容重複チェックを行いました。');
  state.aiStatus = duplicateFixResult.remainingPairs.length
    ? 'AI作問が完了しました。内容が近い問題が少し残っている可能性があるので、レビュー時に確認してください。'
    : (duplicateFixResult.replacedNos.length
      ? `AI作問が完了しました。内容が重複しそうだった問題 ${duplicateFixResult.replacedNos.length} 件を自動で差し替えました。`
      : 'AI作問が完了しました。内容重複も自動チェックしました。');
  state.generatedEnTsv = makeTsvEnFromQuestions(allQuestions);
  state.generatedJaTsv = makeTsvJaFromQuestions(allQuestions);
  state.aiError = '';
  saveLocal();
  persistDraftSnapshotLocal();
}

async function regenerateSingleQuestion(no){
  if(!state.previewQuestions.length) throw new Error('先にクイズを生成してください。');

  const targetNo = Number(no);
  if(!Number.isFinite(targetNo)) throw new Error('作り直す問題番号を認識できませんでした。');

  const original = state.previewQuestions.find(q => Number(q.no) === targetNo);
  if(!original) throw new Error('指定した問題が見つかりませんでした。');

  const chunkText = original._sourceChunk || state.sourceText.trim();
  const cleanedChunkText = preprocessSourceText(chunkText);
  const keptQuestions = state.previewQuestions.filter(q => Number(q.no) !== targetNo);
  const promptTemplate = buildReplacementPromptTemplate([original], keptQuestions);

  state.reviewBusyNo = targetNo;
  state.reviewError = '';
  state.reviewStatus = `Q${targetNo} を作り直しています...`;
  render();

  try{
    const json = await callGenerateQuizChunk(
      cleanedChunkText || chunkText,
      1,
      `${state.title || 'Generated Quiz'} revision`,
      { promptTemplate }
    );

    const candidate = (Array.isArray(json.questions) ? json.questions[0] : null) || {};
    const replacement = {
      ...candidate,
      no: original.no,
      _sourceChunk: cleanedChunkText || chunkText,
      explanation_addendum_en: original.explanation_addendum_en || '',
      explanation_addendum_ja: original.explanation_addendum_ja || '',
    };

    state.previewQuestions = state.previewQuestions
      .map(q => Number(q.no) === targetNo ? replacement : q)
      .sort((a,b)=>a.no-b.no);

    state.reviewUpdatedNos[String(targetNo)] = (state.reviewUpdatedNos[String(targetNo)] || 0) + 1;
    state.generatedEnTsv = makeTsvEnFromQuestions(state.previewQuestions);
    state.generatedJaTsv = makeTsvJaFromQuestions(state.previewQuestions);
    state.reviewStatus = `Q${targetNo} を作り直しました。レビューを続けるか、英語版URLまたは日本語版URLを作成できます。`;
    state.reviewError = '';
    state.shareLink = '';
    state.shareLinks = { en: '', ja: '' };
    persistDraftSnapshotLocal();
  } finally {
    state.reviewBusyNo = null;
    render();
  }
}

      ${state.error ? `<div class="alert error" style="margin-top:12px;">${escapeHtml(state.error)}</div>` : ''}

    <div class="card">

        ${state.reviewError ? `<div class="alert error section-spacer">${escapeHtml(state.reviewError)}</div>` : ''}
        ${state.reviewStatus ? `<div class="alert ok section-spacer">${escapeHtml(state.reviewStatus)}</div>` : ''}
        <div class="section-spacer">
          ${state.previewQuestions.map(q=>{
            const note = state.reviewNotes[String(q.no)] || '';
            const updatedCount = state.reviewUpdatedNos[String(q.no)] || 0;
            const isBusy = Number(state.reviewBusyNo) === Number(q.no);
            return `
              <div class="card question" style="margin-bottom:16px;${updatedCount ? ' border-color:#93c5fd; box-shadow:0 0 0 2px rgba(147,197,253,.2);' : ''}">
                <div class="review-head">
                  <div>
                    <h3>Q${q.no}</h3>
                    <div class="small muted">Correct answer: ${escapeHtml(q.correct || '')}</div>
                  </div>
                  <div>
                    ${updatedCount ? `<span class="pill">updated${updatedCount > 1 ? ` ×${updatedCount}` : ''}</span>` : ''}
                    ${isBusy ? `<span class="pill">regenerating...</span>` : ''}
                  </div>
                </div>
                <div class="review-grid">
                  <div class="review-panel">
                    <h4>English</h4>
                    <div><strong>Question</strong><div class="small" style="margin-top:6px;">${escapeHtml(q.question_en || '')}</div></div>
                    <div style="margin-top:12px;">
                      ${['A','B','C','D'].map(key=>`<div class="review-option ${q.correct===key ? 'correct' : ''}"><strong>${key}.</strong> ${escapeHtml(q[`option${key}_en`] || '')}</div>`).join('')}
                    </div>
                    ${getPreviewExplanationText(q, 'en') ? `<div style="margin-top:12px;"><strong>Explanation</strong><div class="small" style="margin-top:6px; white-space:pre-wrap;">${escapeHtml(getPreviewExplanationText(q, 'en'))}</div></div>` : ''}
                    ${renderPreviewChoiceExplanationBlock(q, 'en')}
                    <div style="margin-top:12px;">
                      <label for="explanationAddendumEn_${q.no}">Explanation addendum</label>
                      <textarea class="review-addendum explanation-addendum-input" id="explanationAddendumEn_${q.no}" data-no="${escapeHtml(String(q.no))}" data-language="en" placeholder="Optional note to append to the English explanation when you save the quiz.">${escapeHtml(q.explanation_addendum_en || '')}</textarea>
                    </div>
                  </div>
                  <div class="review-panel">
                    <h4>日本語</h4>
                    <div><strong>問題</strong><div class="small" style="margin-top:6px;">${escapeHtml(q.question_ja || '')}</div></div>
                    <div style="margin-top:12px;">
                      ${['A','B','C','D'].map(key=>`<div class="review-option ${q.correct===key ? 'correct' : ''}"><strong>${key}.</strong> ${escapeHtml(q[`option${key}_ja`] || '')}</div>`).join('')}
                    </div>
                    ${getPreviewExplanationText(q, 'ja') ? `<div style="margin-top:12px;"><strong>解説</strong><div class="small" style="margin-top:6px; white-space:pre-wrap;">${escapeHtml(getPreviewExplanationText(q, 'ja'))}</div></div>` : ''}
                    ${renderPreviewChoiceExplanationBlock(q, 'ja')}
                    <div style="margin-top:12px;">
                      <label for="explanationAddendumJa_${q.no}">解説への追記</label>
                      <textarea class="review-addendum explanation-addendum-input" id="explanationAddendumJa_${q.no}" data-no="${escapeHtml(String(q.no))}" data-language="ja" placeholder="保存時に日本語の解説末尾へ追加したい注記を入力します。">${escapeHtml(q.explanation_addendum_ja || '')}</textarea>
                    </div>
                  </div>
                </div>
                ${q.excerpt ? `<div style="margin-top:12px;"><strong>Supporting excerpt</strong><div class="small" style="margin-top:6px;">${escapeHtml(q.excerpt)}</div></div>` : ''}
                <div style="margin-top:12px;">
                  <label for="reviewNote_${q.no}">作り直しメモ</label>
                  <textarea class="review-note" id="reviewNote_${q.no}" data-no="${escapeHtml(String(q.no))}" placeholder="例: 問題文が曖昧、選択肢CとDが似すぎている、解説が本文と少しずれている、引用文献リストからは作問しない、など">${escapeHtml(note)}</textarea>
                </div>
                <div class="btns" style="margin-top:12px;">
                  <button class="regenerate-one-btn" data-no="${escapeHtml(String(q.no))}" ${state.reviewBusyNo !== null ? 'disabled' : ''}>${isBusy ? '作り直し中...' : 'この問題を作り直す'}</button>
                </div>
              </div>`;
          }).join('')}
        </div>
      `}

    <div class="card">

        <label class="switchrow"><span><strong>Shuffle choice order</strong><br><span class="muted small">選択肢順をランダム化し、正答も追従させます。</span></span><input id="shuffleC" type="checkbox" ${state.shuffleChoices ? 'checked' : ''}></label>
      </div>

      <div class="alert info" style="margin-top:12px;">レビュー済みの同じ問題セットから、英語版URLと日本語版URLをそれぞれ保存できます。slug はタイトルから自動生成され、英語版は -en、日本語版は -ja を付けて保存します。重複時は連番が付きます。</div>

      <div class="btns">
        <button id="saveReviewedQuizEnBtn" ${state.previewQuestions.length && !state.shareLinks.en ? '' : 'disabled'}>英語版URLを作る</button>
        <button id="saveReviewedQuizJaBtn" ${state.previewQuestions.length && !state.shareLinks.ja ? '' : 'disabled'}>日本語版URLを作る</button>
      </div>

      ${state.shareLinks.en || state.shareLinks.ja ? `<div style="margin-top:12px;">
        ${state.shareLinks.en ? `<div style="margin-top:12px;">
          <label for="shareLinkEn">English share link</label>
          <input id="shareLinkEn" type="text" readonly value="${escapeHtml(state.shareLinks.en)}">
          <div class="btns">
            <button class="copy-share-link" data-link="${escapeHtml(state.shareLinks.en)}">Copy English link</button>
            <a class="buttonlink ghost" href="${escapeHtml(state.shareLinks.en)}" target="_blank" rel="noreferrer">Open English page</a>
          </div>
        </div>` : ''}
        ${state.shareLinks.ja ? `<div style="margin-top:12px;">
          <label for="shareLinkJa">Japanese share link</label>
          <input id="shareLinkJa" type="text" readonly value="${escapeHtml(state.shareLinks.ja)}">
          <div class="btns">
            <button class="copy-share-link" data-link="${escapeHtml(state.shareLinks.ja)}">Copy Japanese link</button>
            <a class="buttonlink ghost" href="${escapeHtml(state.shareLinks.ja)}" target="_blank" rel="noreferrer">Open Japanese page</a>
          </div>
        </div>` : ''}
      </div>` : ''}
    </div>

    <div class="card">
      <div class="topbar">
        <div>
          <h2>4. Draft save and resume</h2>
          <p class="muted">公開URLを作る前のレビュー途中状態を、private draft として保存できます。</p>
        </div>
        <div>
          ${state.draftId ? `<span class="pill">server draft linked</span>` : `<span class="pill">server draft none</span>`}

      </div>

      <div class="small muted" style="margin-top:10px;">
        ${state.draftId ? `現在の画面は保存済み draft にひも付いています。最終保存: ${escapeHtml(formatDraftTimestamp(state.draftUpdatedAt))}` : 'まだ Supabase の draft には保存していません。'}
      </div>
      <div class="small muted" style="margin-top:4px;">
        ${state.hasLocalSnapshot ? `このブラウザには local snapshot があります。最終記録: ${escapeHtml(formatDraftTimestamp(state.snapshotUpdatedAt))}` : 'local snapshot はまだありません。'}
      </div>

      <div class="btns">
        <button id="saveDraftBtn" ${hasDraftData ? '' : 'disabled'}>Save draft</button>
        <button class="secondary" id="loadLatestDraftBtn">Load latest draft</button>
        <button class="secondary" id="restoreLocalSnapshotBtn" ${state.hasLocalSnapshot ? '' : 'disabled'}>Restore local snapshot</button>
        <button class="secondary" id="discardLocalSnapshotBtn" ${state.hasLocalSnapshot ? '' : 'disabled'}>Discard local snapshot</button>
        <button class="secondary" id="deleteCurrentDraftBtn" ${state.draftId ? '' : 'disabled'}>Delete loaded draft</button>
      </div>

      ${state.draftError ? `<div class="alert error" style="margin-top:12px;">${escapeHtml(state.draftError)}</div>` : ''}
      ${state.draftStatus ? `<div class="alert ok" style="margin-top:12px;">${escapeHtml(state.draftStatus)}</div>` : ''}
    </div>

    <div class="card">
      <div class="topbar">
        <div>
          <h2>5. Saved quizzes</h2>
          <p class="muted">検索、並べ替え、出題済み管理、非表示管理ができます。</p>
        </div>
        <div class="btns" style="margin-top:0;">
          <button class="secondary" id="copyVisibleListBtn">Copy visible list</button>
          <button class="secondary" id="refreshListBtn">Refresh list</button>
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div>
          <label for="listSearch">Search</label>
          <input id="listSearch" type="text" value="${escapeHtml(state.listSearch)}" placeholder="タイトル / slug / 説明で検索">
        </div>
        <div>
          <label for="listSort">Sort</label>
          <select id="listSort">
            <option value="created_desc" ${state.listSort === 'created_desc' ? 'selected' : ''}>作成日が新しい順</option>
            <option value="created_asc" ${state.listSort === 'created_asc' ? 'selected' : ''}>作成日が古い順</option>
            <option value="title_asc" ${state.listSort === 'title_asc' ? 'selected' : ''}>タイトル昇順</option>
            <option value="title_desc" ${state.listSort === 'title_desc' ? 'selected' : ''}>タイトル降順</option>
          </select>
        </div>
      </div>

      <div class="btns">
        <label class="small" style="display:flex;align-items:center;gap:8px;margin:0;">
          <input id="showHidden" type="checkbox" ${state.showHidden ? 'checked' : ''}>
          非表示のクイズも表示する
        </label>
      </div>

      <div class="alert info" style="margin-top:12px;">Copy visible list は、現在の検索・並べ替えを反映しつつ、非表示のクイズを除いた title / description / url のTSV形式でコピーします。各行の Copy details は、そのクイズ1件分のタイトル・説明・URLをコピーします。</div>
      <div class="alert info" style="margin-top:12px;">出題済みと非表示の状態は、このブラウザの localStorage に保存されます。</div>
      ${state.listStatus ? `<div class="alert info" style="margin-top:12px;">${escapeHtml(state.listStatus)}</div>` : ''}
      <div style="margin-top:12px;">${listRowsHtml()}</div>
    </div>
  `;

  const signOutBtn = document.getElementById('signOutBtn');
  if(signOutBtn){
    signOutBtn.onclick = async ()=>{
      try{
        await signOutBuilder();
        render();
      }catch(e){
        state.authError = e.message || 'ログアウトに失敗しました。';
        render();
      }
    };
  }

  ['systemPromptJa','promptTemplateJa','systemPromptEn','promptTemplateEn','listSearch','generatedTitle','generatedDescription'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('input', e=>{
      const value = e.target.value;
      if(id === 'generatedTitle'){
        state.title = value;
      }else if(id === 'generatedDescription'){
        state.description = value;
      }else{
        state[id] = value;
      }
      saveLocal();
      if(id !== 'listSearch') scheduleDraftSnapshotSave();
      if(id === 'listSearch') render();
    });
  });

  document.getElementById('questionCount').addEventListener('input', e=>{
    state.questionCount = clampNumber(Number(e.target.value || 10), 1, 20);
    state.questionCountMode = 'manual';
    saveLocal();
    scheduleDraftSnapshotSave();
    render();
  });

  document.getElementById('recalcQuestionCountBtn').onclick = ()=>{
    state.questionCountMode = 'auto';
    applyAutoQuestionCount({ force: true });
    saveLocal();
    scheduleDraftSnapshotSave();
    render();
  };

  document.getElementById('listSort').addEventListener('change', e=>{
    state.listSort = e.target.value;
    saveLocal();
    render();
  });

  document.getElementById('showHidden').addEventListener('change', e=>{
    state.showHidden = e.target.checked;
    saveLocal();
    render();
  });

  const sourceTextEl = document.getElementById('sourceText');
  if(sourceTextEl){
    sourceTextEl.addEventListener('input', e=>{
      state.sourceText = e.target.value;
      applyAutoQuestionCount({ syncDom: true });
      saveLocal();
      scheduleDraftSnapshotSave();
    });
    sourceTextEl.addEventListener('change', ()=>{
      render();
    });
  }

  document.getElementById('shuffleQ').addEventListener('change', e=>{ state.shuffleQuestions = e.target.checked; saveLocal(); scheduleDraftSnapshotSave(); });
  document.getElementById('shuffleC').addEventListener('change', e=>{ state.shuffleChoices = e.target.checked; saveLocal(); scheduleDraftSnapshotSave(); });

  const promptLanguageEl = document.getElementById('promptLanguage');
  if(promptLanguageEl){
    promptLanguageEl.addEventListener('change', e=>{
      setPromptLanguage(e.target.value === 'en' ? 'en' : 'ja');
      saveLocal();
      scheduleDraftSnapshotSave();
      render();
    });
  }

  document.getElementById('resetPromptBtn').onclick = ()=>{
    resetPromptSettingsToDefaults();
    state.aiStatus = 'Japanese / English の prompt を両方デフォルトに戻しました。';
    state.aiError = '';
    saveLocal();
    scheduleDraftSnapshotSave();
    render();
  };

  document.getElementById('clearBuilderBtn').onclick = ()=>{
    clearBuilderVolatileState({ discardSnapshot: true });
    saveLocal();
    render();
  };

  document.getElementById('aiGenerateReviewBtn').onclick = async ()=>{
    try{
      state.aiError = '';
      state.error = '';
      state.shareLink = '';
      state.shareLinks = { en: '', ja: '' };
      state.aiStatus = 'AIで作問中です...';
      state.reviewStatus = '';
      state.reviewError = '';
      render();
      await generateQuizWithAI();
      render();
    }catch(e){
      state.aiStatus = '';
      state.aiError = e.message || 'AI作問に失敗しました。';
      render();
    }
  };

  const saveReviewedQuizEnBtn = document.getElementById('saveReviewedQuizEnBtn');
  if(saveReviewedQuizEnBtn){
    saveReviewedQuizEnBtn.onclick = async ()=>{
      try{
        await saveReviewedQuiz('en');
      }catch(e){
        state.status = '';
        state.error = e.message || 'English版の保存に失敗しました。';
        render();
      }
    };
  }

  const saveReviewedQuizJaBtn = document.getElementById('saveReviewedQuizJaBtn');
  if(saveReviewedQuizJaBtn){
    saveReviewedQuizJaBtn.onclick = async ()=>{
      try{
        await saveReviewedQuiz('ja');
      }catch(e){
        state.status = '';
        state.error = e.message || '日本語版の保存に失敗しました。';
        render();
      }
    };
  }

  document.querySelectorAll('.regenerate-one-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        const no = Number(btn.dataset.no || '');
        await regenerateSingleQuestion(no);
      }catch(e){
        state.reviewStatus = '';
        state.reviewError = e.message || '問題の作り直しに失敗しました。';
        state.reviewBusyNo = null;
        render();
      }
    };
  });

  document.querySelectorAll('.review-note').forEach(el=>{
    el.addEventListener('input', e=>{
      state.reviewNotes[e.target.dataset.no || ''] = e.target.value;
      scheduleDraftSnapshotSave();
    });
  });

  document.querySelectorAll('.explanation-addendum-input').forEach(el=>{
    el.addEventListener('input', e=>{
      const no = Number(e.target.dataset.no || '');
      const language = e.target.dataset.language === 'ja' ? 'ja' : 'en';
      const field = language === 'ja' ? 'explanation_addendum_ja' : 'explanation_addendum_en';
      state.previewQuestions = (state.previewQuestions || []).map(q => Number(q.no) === no ? { ...q, [field]: e.target.value } : q);
      state.generatedEnTsv = makeTsvEnFromQuestions(state.previewQuestions);
      state.generatedJaTsv = makeTsvJaFromQuestions(state.previewQuestions);
      state.status = '解説への追記を反映しました。レビューを続けて保存できます。';
      state.error = '';
      state.shareLink = '';
      state.shareLinks = { en: '', ja: '' };
      scheduleDraftSnapshotSave();
    });
  });

  const saveDraftBtn = document.getElementById('saveDraftBtn');
  if(saveDraftBtn){
    saveDraftBtn.onclick = async ()=>{
      try{
        await saveBuilderDraft();
      }catch(e){
        state.draftStatus = '';
        state.draftError = e.message || '下書きの保存に失敗しました。';
        render();
      }
    };
  }

  const loadLatestDraftBtn = document.getElementById('loadLatestDraftBtn');
  if(loadLatestDraftBtn){
    loadLatestDraftBtn.onclick = async ()=>{
      try{
        if(hasDraftContent() && !confirm('現在の編集中内容は上書きされます。先に Save draft しておくと安全です。最新の下書きを読み込みますか？')) return;
        state.draftError = '';
        state.draftStatus = '最新の下書きを読み込み中です...';
        render();
        await loadLatestBuilderDraft();
        render();
      }catch(e){
        state.draftStatus = '';
        state.draftError = e.message || '下書きの読み込みに失敗しました。';
        render();
      }
    };
  }

  const restoreLocalSnapshotBtn = document.getElementById('restoreLocalSnapshotBtn');
  if(restoreLocalSnapshotBtn){
    restoreLocalSnapshotBtn.onclick = ()=>{
      try{
        if(hasDraftContent() && !confirm('現在の編集中内容は上書きされます。local snapshot を復元しますか？')) return;
        restoreLocalDraftSnapshot();
        render();
      }catch(e){
        state.draftStatus = '';
        state.draftError = e.message || 'local snapshot の復元に失敗しました。';
        render();
      }
    };
  }

  const discardLocalSnapshotBtn = document.getElementById('discardLocalSnapshotBtn');
  if(discardLocalSnapshotBtn){
    discardLocalSnapshotBtn.onclick = ()=>{
      discardLocalDraftSnapshot();
      state.draftStatus = 'local snapshot を削除しました。';
      state.draftError = '';
      render();
    };
  }

  const deleteCurrentDraftBtn = document.getElementById('deleteCurrentDraftBtn');
  if(deleteCurrentDraftBtn){
    deleteCurrentDraftBtn.onclick = async ()=>{
      try{
        if(!confirm('現在ひも付いている Supabase draft を削除します。画面上の内容は残します。削除しますか？')) return;
        state.draftError = '';
        state.draftStatus = '下書きを削除しています...';
        render();
        await deleteCurrentBuilderDraft();
        render();
      }catch(e){
        state.draftStatus = '';
        state.draftError = e.message || '下書きの削除に失敗しました。';
        render();
      }
    };
  }

  document.getElementById('refreshListBtn').onclick = refreshQuizList;

  const copyVisibleListBtn = document.getElementById('copyVisibleListBtn');
  if(copyVisibleListBtn){
    copyVisibleListBtn.onclick = async ()=>{
      try{
        const text = buildVisibleQuizListTsv();
        await navigator.clipboard.writeText(text);
        const original = copyVisibleListBtn.textContent;
        copyVisibleListBtn.textContent = 'Copied';
        setTimeout(()=> copyVisibleListBtn.textContent = original, 1200);
      }catch(e){}
    };
  }

  document.querySelectorAll('.copy-list-link').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(btn.dataset.link || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(()=> btn.textContent = original, 1200);
      }catch(e){}
    };
  });

  document.querySelectorAll('.copy-quiz-details-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        const text = buildSingleQuizCopyText(btn.dataset.slug || '');
        if(!text) return;
        await navigator.clipboard.writeText(text);
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(()=> btn.textContent = original, 1200);
      }catch(e){}
    };
  });

  document.querySelectorAll('.toggle-used').forEach(el=>{
    el.addEventListener('change', e=>{
      setQuizMeta(e.target.dataset.slug || '', { used: e.target.checked });
      render();
    });
  });

  document.querySelectorAll('.toggle-hidden').forEach(el=>{
    el.addEventListener('change', e=>{
      setQuizMeta(e.target.dataset.slug || '', { hidden: e.target.checked });
      render();
    });
  });

  document.querySelectorAll('.copy-share-link').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(btn.dataset.link || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(()=> btn.textContent = original, 1400);
      }catch(e){}
    };
  });

}

window.addEventListener('beforeunload', ()=>{
  try{ persistDraftSnapshotLocal(); }catch(_e){}
});

(async function init(){
  loadLocal();
  loadQuizMeta();
  loadLocalDraftSnapshotMeta();
  const quizSlug = getSlugFromQuery();
  if(quizSlug){
    try{
      state.mode = 'solver';
      await loadQuizFromSupabase(quizSlug);
    }catch(e){
      state.mode = 'builder';
      clearBuilderVolatileState();
      state.error = e.message || 'クイズの読み込みに失敗しました。';
      attachBuilderAuthListener();
      await syncBuilderAuthState();
      if(state.authUser){
        try{ await refreshQuizList(); }catch(_){}
      }
    }
  }else{
    state.mode = 'builder';
    clearBuilderVolatileState();
    attachBuilderAuthListener();
    await syncBuilderAuthState();
    if(state.authUser){
      try{ await refreshQuizList(); }catch(_){}
    }
  }
  render();
})();
</script>
</body>
</html>
