<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Builder</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --primary:#2563eb; --primary-soft:#dbeafe; --green:#15803d; --green-soft:#dcfce7;
      --red:#b91c1c; --red-soft:#fee2e2; --amber:#92400e; --amber-soft:#fef3c7;
      --shadow:0 8px 24px rgba(17,24,39,.08); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .wrap{max-width:1120px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
    h1,h2,h3{margin:0 0 10px 0;line-height:1.25}
    h1{font-size:30px} h2{font-size:22px} h3{font-size:18px}
    p{margin:8px 0}
    .muted{color:var(--muted)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media (max-width:780px){.row{grid-template-columns:1fr}}
    label{display:block;font-weight:600;margin-bottom:6px}
    input[type="text"], input[type="number"], select, textarea, input[type="file"]{
      width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;background:#fff
    }
    textarea{min-height:220px;resize:vertical}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button,.buttonlink{
      border:none;background:var(--primary);color:#fff;border-radius:14px;padding:11px 16px;
      font:inherit;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block
    }
    button.secondary,.buttonlink.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    button.ghost,.buttonlink.ghost{background:#eef2ff;color:#1e3a8a}
    button:disabled{opacity:.55;cursor:not-allowed}
    .pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:700;margin-right:8px}
    .alert{border-radius:14px;padding:12px 14px;border:1px solid var(--line);background:#fff}
    .alert.error{background:var(--red-soft);color:#7f1d1d;border-color:#fecaca}
    .alert.info{background:var(--primary-soft);color:#1e3a8a;border-color:#bfdbfe}
    .alert.ok{background:var(--green-soft);color:#14532d;border-color:#bbf7d0}
    .switches{display:grid;gap:12px}
    .switchrow{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
    .question{margin-bottom:16px}
    .selected-for-regeneration{border-color:#bfdbfe;box-shadow:0 0 0 2px #dbeafe inset}
    .option{border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-top:10px;background:#fff;transition:.15s ease}
    .option:hover{border-color:#c7d2fe}
    .option.selected{border-color:#93c5fd;background:#f8fbff}
    .option.correct{border-color:#86efac;background:#f0fdf4}
    .option.wrong{border-color:#fca5a5;background:#fef2f2}
    .feedback{margin-top:12px;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fafafa}
    .feedback.correct{background:var(--green-soft);border-color:#bbf7d0}
    .feedback.incorrect{background:var(--amber-soft);border-color:#fde68a}
    .small{font-size:14px}
    .topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}
    .dropzone{border:2px dashed #bfdbfe;border-radius:16px;padding:18px;text-align:center;background:#f8fbff;transition:.15s ease}
    .dropzone.drag{background:#eff6ff;border-color:#60a5fa}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
    .list-head,.list-row{display:grid;grid-template-columns:1.3fr .9fr .8fr auto;gap:12px;align-items:center}
    .list-head{padding:0 6px 10px 6px;color:var(--muted);font-size:13px;font-weight:700}
    .list-row{padding:12px 6px;border-top:1px solid var(--line)}
    .promptbox{margin-top:14px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fafafa}
    .promptbox summary{cursor:pointer;font-weight:700}
    .review-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}
    .review-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .review-panel{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fafafa}
    .review-panel h4{margin:0 0 10px 0;font-size:16px}
    .review-option{padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-top:8px}
    .review-option.correct{border-color:#86efac;background:#f0fdf4}
    .review-note{min-height:96px}
    .section-spacer{margin-top:16px}
    @media (max-width:900px){
      .list-head{display:none}
      .list-row{grid-template-columns:1fr;gap:8px}
    }
  </style>
</head>

function escapeHtml(s=''){ return s.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function norm(s=''){ return s.toLowerCase().replace(/[\s_\-・（）()]/g,'').replace(/：/g,'').trim(); }
function slugify(s=''){
  return s.toLowerCase().normalize('NFKD').replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,80);
}
function shuffleArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function parseTSV(tsv){
  const lines = tsv.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(x=>x.trim());
  if(lines.length<2) throw new Error("TSVの行数が足りません。ヘッダー行と少なくとも1問分のデータが必要です。");
  const headers = lines[0].split("\t").map(x=>x.trim());
  const h = headers.map(norm);
  const idx = (...cands)=>{ for(const c of cands){ const i=h.indexOf(norm(c)); if(i>=0) return i; } return -1; };
  const map = {
    no: idx("No","番号","questionno"),
    q: idx("Question","問題","Question title","Questiontitle"),
    a: idx("Option A","A","選択肢A"),
    b: idx("Option B","B","選択肢B"),
    c: idx("Option C","C","選択肢C"),
    d: idx("Option D","D","選択肢D"),
    correct: idx("Correct Answer","Correct","Answer","正答","正解","解答"),
    explanation: idx("Explanation","解説","Feedback","Answer feedback"),
    aexp: idx("Option A Explanation","A Explanation","Option A Note","A Note","選択肢A解説","選択肢Aの解説"),
    bexp: idx("Option B Explanation","B Explanation","Option B Note","B Note","選択肢B解説","選択肢Bの解説"),
    cexp: idx("Option C Explanation","C Explanation","Option C Note","C Note","選択肢C解説","選択肢Cの解説"),
    dexp: idx("Option D Explanation","D Explanation","Option D Note","D Note","選択肢D解説","選択肢Dの解説"),
    excerpt: idx("Supporting Excerpt","Excerpt","根拠","根拠本文抜粋","本文抜粋"),
  };
  const required = ["q","a","b","c","d","correct"].filter(k=>map[k]===-1);
  if(required.length) throw new Error("必要な列が見つかりません: " + required.join(", "));
  return lines.slice(1).map((line,i)=>{
    const cells = line.split("\t");
    const correct = ((cells[map.correct]||"").trim().toUpperCase());
    if(!["A","B","C","D"].includes(correct)) throw new Error((i+2)+"行目の正答がA/B/C/Dになっていません。");
    return {
      id: (cells[map.no]||String(i+1)).trim(),
      question: (cells[map.q]||"").trim(),
      options: { A:(cells[map.a]||"").trim(), B:(cells[map.b]||"").trim(), C:(cells[map.c]||"").trim(), D:(cells[map.d]||"").trim() },
      correct,
      explanation: map.explanation>=0 ? (cells[map.explanation]||"").trim() : "",
      optionExplanations: {
        A: map.aexp>=0 ? (cells[map.aexp]||"").trim() : "",
        B: map.bexp>=0 ? (cells[map.bexp]||"").trim() : "",
        C: map.cexp>=0 ? (cells[map.cexp]||"").trim() : "",
        D: map.dexp>=0 ? (cells[map.dexp]||"").trim() : "",
      },
      excerpt: map.excerpt>=0 ? (cells[map.excerpt]||"").trim() : "",
    };
  }).filter(r => r.question && r.options.A && r.options.B && r.options.C && r.options.D);
}
function buildQuestions(questions, shuffleQ, shuffleC){
  let qs = questions.map(q=>{
    let entries = Object.entries(q.options).map(([k,v])=>({orig:k, text:v}));
    if(shuffleC) entries = shuffleArray(entries);
    const displayOptions = {}, map = {}, displayOptionExplanations = {};
    ["A","B","C","D"].forEach((key, idx)=>{
      displayOptions[key]=entries[idx].text;
      map[key]=entries[idx].orig;
      displayOptionExplanations[key] = (q.optionExplanations && q.optionExplanations[entries[idx].orig]) || q[`optionExplanation${entries[idx].orig}`] || '';
    });
    const displayCorrect = Object.keys(map).find(k => map[k]===q.correct) || q.correct;
    return {...q, displayOptions, displayCorrect, displayOptionExplanations};
  });
  if(shuffleQ) qs = shuffleArray(qs);
  return qs;
}
function tsvEscape(value=''){
  return String(value).replace(/\t/g, " ").replace(/\r?\n/g, " ").trim();
}
function makeTsvEnFromQuestions(questions){
  const header = [

      q.optionC_explanation_en || "",

    ].map(tsvEscape).join("\t"));
  });
  return lines.join("\n");
}
function makeTsvJaFromQuestions(questions){
  const header = [
    "No","Question","Option A","Option B","Option C","Option D",
    "Correct Answer","Explanation","Option A Explanation","Option B Explanation","Option C Explanation","Option D Explanation","Supporting Excerpt"
  ];
  const lines = [header.join("\t")];

}
function isAllCapsHeading(line=''){
  const s = line.trim();
  if (!s) return false;
  if (s.length < 4 || s.length > 120) return false;
  if (!/[A-Z]/.test(s)) return false;
  return /^[A-Z0-9 ,;:'"()\/\-\u2019&.]+$/.test(s);
}
function splitIntoSections(text=''){
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  const sections = [];
  let current = [];
  for (const line of lines) {
    if (isAllCapsHeading(line) && current.length) {
      sections.push(current.join("\n").trim());
      current = [line];
    } else {
      current.push(line);
    }
  }
  if (current.length) sections.push(current.join("\n").trim());
  return sections.filter(Boolean);
}
const EXCLUDED_SECTION_HEADINGS = [
  'REFERENCES',
  'REFERENCE',
  'BIBLIOGRAPHY',
  'FURTHER READING',
  'SUGGESTED READING',
  'CLIENT INFORMATION',
  'CLIENT INFORMATION SHEET',
  'ACKNOWLEDGMENTS',
  'ACKNOWLEDGEMENTS',
  'AUTHOR INFORMATION',
  'AUTHOR AFFILIATIONS',
];
function normalizeHeadingForMatch(s=''){
  return s.toUpperCase().replace(/[^A-Z0-9]+/g, ' ').trim();
}
function isExcludedSectionHeading(line=''){
  const normalized = normalizeHeadingForMatch(line);
  if (!normalized) return false;
  return EXCLUDED_SECTION_HEADINGS.some(head => normalized === head || normalized.startsWith(head + ' '));
}
function preprocessSourceText(text=''){
  const clean = String(text || '').replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
  if (!clean) return '';

  const sections = splitIntoSections(clean);
  if (sections.length > 1) {
    return sections
      .filter(section => {
        const firstLine = (section.split("\n").find(line => line.trim()) || '').trim();
        return !isExcludedSectionHeading(firstLine);
      })
      .join("\n\n")
      .trim();
  }

  const lines = clean.split("\n");
  const firstExcludedIndex = lines.findIndex(line => isExcludedSectionHeading(line));
  if (firstExcludedIndex >= 0) {
    return lines.slice(0, firstExcludedIndex).join("\n").trim();
  }

  return clean;
}
function splitLargeTextFallback(text, maxChars){
  const paragraphs = text.split(/\n{2,}/).map(s=>s.trim()).filter(Boolean);
  if (paragraphs.length === 0) return [text];
  const chunks = [];
  let current = "";
  for (const p of paragraphs) {
    const candidate = current ? `${current}\n\n${p}` : p;
    if (candidate.length <= maxChars || !current) {
      current = candidate;
    } else {
      chunks.push(current);
      current = p;
    }
  }
  if (current) chunks.push(current);
  return chunks;
}
function splitSourceIntoChunks(sourceText, questionCount){
  const clean = sourceText.trim();
  const maxChars = questionCount > 10 ? 9000 : 12000;

  let sections = splitIntoSections(clean);
  if (sections.length <= 1) {
    sections = splitLargeTextFallback(clean, maxChars);
  }

  let chunks = [];
  let current = "";

  for (const section of sections) {
    const candidate = current ? `${current}\n\n${section}` : section;
    if (candidate.length <= maxChars || !current) {
      current = candidate;
    } else {
      chunks.push(current);
      current = section;
    }
  }
  if (current) chunks.push(current);

  if (chunks.length === 1 && clean.length > maxChars) {
    chunks = splitLargeTextFallback(clean, maxChars);
  }

  while (chunks.length > questionCount) {
    const last = chunks.pop();
    chunks[chunks.length - 1] = `${chunks[chunks.length - 1]}\n\n${last}`;
  }

  return chunks.filter(Boolean);
}
function allocateQuestions(total, chunks){
  const n = chunks.length;
  if (n === 1) return [total];
  const lengths = chunks.map(c => Math.max(c.length, 1));
  const sum = lengths.reduce((a,b)=>a+b,0);

  let alloc = new Array(n).fill(1);
  let remaining = total - n;

  if (remaining < 0) {
    return new Array(total).fill(1);
  }

  const exactExtras = lengths.map(len => (len / sum) * remaining);
  const floorExtras = exactExtras.map(x => Math.floor(x));
  alloc = alloc.map((v, i) => v + floorExtras[i]);
  let distributed = floorExtras.reduce((a,b)=>a+b,0);
  let leftovers = remaining - distributed;

  const order = exactExtras
    .map((x, i) => ({ i, frac: x - Math.floor(x) }))
    .sort((a,b) => b.frac - a.frac);

  let idx = 0;
  while (leftovers > 0) {
    alloc[order[idx % order.length].i] += 1;
    leftovers -= 1;
    idx += 1;
  }

  return alloc;
}

function clampNumber(value, min, max){
  return Math.max(min, Math.min(max, value));
}
function estimateWordCountFromCleanText(clean=''){
  const text = String(clean || '').trim();
  if(!text) return 0;
  const latinTokens = text.match(/[A-Za-z0-9]+(?:['’.-][A-Za-z0-9]+)*/g) || [];
  const whitespaceWords = text.split(/\s+/).filter(Boolean).length;
  const japaneseChars = (text.match(/[぀-ヿ㐀-鿿]/g) || []).length;
  const japaneseApproxWords = japaneseChars ? Math.round(japaneseChars / 2.5) : 0;
  return Math.max(latinTokens.length, whitespaceWords, japaneseApproxWords);
}
function getQuestionCountMetrics(text=''){
  const raw = String(text || '').trim();
  const cleanedText = preprocessSourceText(raw);
  const estimatedWords = estimateWordCountFromCleanText(cleanedText);
  const recommended = cleanedText ? clampNumber(Math.round(estimatedWords / 333), 5, 20) : 10;
  return {
    cleanedText,
    estimatedWords,
    recommended,
    removedChars: Math.max(0, raw.length - cleanedText.length),
  };
}
function questionCountHintHtml(metrics){
  if(!metrics.cleanedText){
    return '本文を貼り付けると、参考文献などを除いた本文量から推奨問題数を自動計算します。';
  }
  return `本文推定語数: <span class="mono">${metrics.estimatedWords.toLocaleString('en-US')}</span> words ・ 推奨: <span class="mono">${metrics.recommended}</span>問`;
}
function syncQuestionCountUi(){
  const metrics = getQuestionCountMetrics(state.sourceText);
  const hint = document.getElementById('questionCountHint');
  if(hint) hint.innerHTML = questionCountHintHtml(metrics);
  const modeHint = document.getElementById('questionCountModeHint');
  if(modeHint){
    modeHint.textContent = state.questionCountMode === 'auto'
      ? '本文量に応じた自動設定中です。必要なら手動で変更できます。'
      : '手動設定中です。「本文長から再計算」を押すと推奨値に戻せます。';
  }
  const input = document.getElementById('questionCount');
  if(input && state.questionCountMode === 'auto'){
    input.value = String(metrics.recommended);
  }
}
function applyAutoQuestionCount({ force=false, syncDom=false }={}){
  const metrics = getQuestionCountMetrics(state.sourceText);
  if(force || state.questionCountMode === 'auto'){
    state.questionCount = metrics.recommended;
  }
  if(syncDom){

  }
  return metrics;
}

let browserSupabaseClient = null;
let authListenerAttached = false;

function getBuilderRedirectUrl(){
  return `${location.origin}${location.pathname}`;
}

function getBrowserSupabaseClient(){
  if(!window.supabase || typeof window.supabase.createClient !== 'function'){
    throw new Error('Supabase Auth client を読み込めませんでした。');
  }
  if(!browserSupabaseClient){
    browserSupabaseClient = window.supabase.createClient(getSupabaseBaseUrl(), state.supabaseKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
      },
    });
  }
  return browserSupabaseClient;
}

async function getBuilderSession(){
  const supabase = getBrowserSupabaseClient();
  const { data, error } = await supabase.auth.getSession();
  if(error) throw error;
  return data.session || null;
}

async function getBuilderAccessToken(){
  if(state.authAccessToken) return state.authAccessToken;
  const session = await getBuilderSession();
  state.authAccessToken = session?.access_token || '';
  if(session?.user){
    state.authUser = session.user;
    if(session.user.email) state.authEmail = session.user.email;
  }
  return state.authAccessToken;
}

async function syncBuilderAuthState(){
  if(state.mode === 'solver') return;
  try{
    const session = await getBuilderSession();
    state.authUser = session?.user || null;
    state.authAccessToken = session?.access_token || '';
    state.authEmail = state.authUser?.email || state.authEmail || '';
    state.authError = '';
  }catch(err){
    state.authUser = null;
    state.authAccessToken = '';
    state.authError = err?.message || 'ログイン状態の確認に失敗しました。';
  }
  state.authReady = true;
}

function attachBuilderAuthListener(){
  if(authListenerAttached || state.mode === 'solver') return;
  const supabase = getBrowserSupabaseClient();
  supabase.auth.onAuthStateChange((_event, session)=>{
    state.authUser = session?.user || null;
    state.authAccessToken = session?.access_token || '';
    if(state.authUser?.email) state.authEmail = state.authUser.email;
    state.authReady = true;
    state.authError = '';

    setTimeout(async ()=>{
      if(state.mode === 'builder' && state.authUser){
        try{
          await refreshQuizList();
        }catch(e){
          state.listStatus = e.message || '一覧の読み込みに失敗しました。';
          render();
        }
      }else if(state.mode === 'builder'){
        state.quizList = [];
        state.listStatus = '';
        render();
      }else{
        render();
      }
    }, 0);
  });
  authListenerAttached = true;
}

async function sendBuilderMagicLink(){
  const email = (state.authEmail || '').trim();
  if(!email) throw new Error('ログインに使うメールアドレスを入力してください。');

  const supabase = getBrowserSupabaseClient();
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      shouldCreateUser: false,
      emailRedirectTo: getBuilderRedirectUrl(),
    },
  });

  if(error) throw error;

  state.authStatus = `${email} にログインリンクを送信しました。メール内のリンクからこのページに戻ってください。`;
  state.authError = '';
}

async function signOutBuilder(){
  const supabase = getBrowserSupabaseClient();
  const { error } = await supabase.auth.signOut();
  if(error) throw error;

  state.authStatus = '';
  state.authError = '';
  state.authUser = null;
  state.authAccessToken = '';
  state.quizList = [];
  state.listStatus = '';
  clearBuilderVolatileState();
}

  state.title = 'Chapter Quiz';

  state.questions = [];

function syncPromptMode(){
  state.promptMode = (
    state.systemPrompt === DEFAULT_SYSTEM_PROMPT &&
    state.promptTemplate === DEFAULT_PROMPT_TEMPLATE
  ) ? 'default' : 'custom';
}

function saveLocal(){
  if(state.mode === 'solver') return;
  syncPromptMode();
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    supabaseUrl: state.supabaseUrl,
    supabaseKey: state.supabaseKey,
    shuffleQuestions: state.shuffleQuestions,
    shuffleChoices: state.shuffleChoices,
    promptMode: state.promptMode,
    promptDefaultsVersion: PROMPT_DEFAULTS_VERSION,
    systemPrompt: state.promptMode === 'custom' ? state.systemPrompt : '',
    promptTemplate: state.promptMode === 'custom' ? state.promptTemplate : '',
    autoSaveLanguage: state.autoSaveLanguage,
    listSort: state.listSort,
    showHidden: state.showHidden,
  }));
}

function loadLocal(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    state.supabaseUrl = s.supabaseUrl || state.supabaseUrl;
    state.supabaseKey = s.supabaseKey || state.supabaseKey;
    state.shuffleQuestions = !!s.shuffleQuestions;
    state.shuffleChoices = !!s.shuffleChoices;
    state.autoSaveLanguage = s.autoSaveLanguage || 'en';
    state.listSort = s.listSort || 'created_desc';
    state.showHidden = !!s.showHidden;

    if (s.promptMode === 'custom' && Number(s.promptDefaultsVersion || 0) === PROMPT_DEFAULTS_VERSION) {
      state.systemPrompt = s.systemPrompt || DEFAULT_SYSTEM_PROMPT;
      state.promptTemplate = s.promptTemplate || DEFAULT_PROMPT_TEMPLATE;
      state.promptMode = 'custom';
    } else {
      state.systemPrompt = DEFAULT_SYSTEM_PROMPT;
      state.promptTemplate = DEFAULT_PROMPT_TEMPLATE;
      state.promptMode = 'default';
    }
  }catch(e){}
}

function saveQuizMeta(){

}

function loadQuizMeta(){

  if(!raw) return;
  try{
    state.quizMeta = JSON.parse(raw) || {};

}

function getQuizMeta(slug=''){

}

function setQuizMeta(slug, patch){

function buildQuizQuestionsForLanguage(sourceQuestions, language='en'){
  return (sourceQuestions || []).map((q, i)=>({
    id: String(q.no || (i + 1)),
    language,
    question: language === 'ja' ? (q.question_ja || '') : (q.question_en || ''),
    options: {
      A: language === 'ja' ? (q.optionA_ja || '') : (q.optionA_en || ''),
      B: language === 'ja' ? (q.optionB_ja || '') : (q.optionB_en || ''),
      C: language === 'ja' ? (q.optionC_ja || '') : (q.optionC_en || ''),
      D: language === 'ja' ? (q.optionD_ja || '') : (q.optionD_en || ''),
    },
    correct: q.correct || 'A',
    explanation: language === 'ja' ? (q.explanation_ja || '') : (q.explanation_en || ''),
    optionExplanations: {
      A: language === 'ja' ? (q.optionA_explanation_ja || '') : (q.optionA_explanation_en || ''),
      B: language === 'ja' ? (q.optionB_explanation_ja || '') : (q.optionB_explanation_en || ''),
      C: language === 'ja' ? (q.optionC_explanation_ja || '') : (q.optionC_explanation_en || ''),
      D: language === 'ja' ? (q.optionD_explanation_ja || '') : (q.optionD_explanation_en || ''),
    },
    excerpt: q.excerpt || '',
  }));
}

function getPreviewChoiceExplanation(q, key, language='en'){
  return language === 'ja' ? (q[`option${key}_explanation_ja`] || '') : (q[`option${key}_explanation_en`] || '');
}

function renderPreviewChoiceExplanationBlock(q, language='en'){
  const items = ['A','B','C','D'].map(key=>{
    const text = getPreviewChoiceExplanation(q, key, language);
    if(!text) return '';
    return `<div class="small" style="margin-top:6px;"><strong>${key}.</strong> ${escapeHtml(text)}</div>`;
  }).filter(Boolean).join('');
  if(!items) return '';
  return `<div style="margin-top:12px;"><strong>${language === 'ja' ? '各選択肢の解説' : 'Choice-by-choice notes'}</strong><div style="margin-top:6px;">${items}</div></div>`;
}

function renderSavedChoiceExplanationBlock(q, language='en'){
  const items = ['A','B','C','D'].map(key=>{
    const text = (q.displayOptionExplanations && q.displayOptionExplanations[key]) || (q.optionExplanations && q.optionExplanations[key]) || q[`optionExplanation${key}`] || '';
    if(!text) return '';
    return `<div class="small" style="margin-top:6px;"><strong>${key}.</strong> ${escapeHtml(text)}</div>`;
  }).filter(Boolean).join('');
  if(!items) return '';
  return `<div style="margin-top:8px;"><strong>${language === 'ja' ? '各選択肢の解説' : 'Choice-by-choice notes'}</strong><div style="margin-top:6px;">${items}</div></div>`;
}

function getSupabaseBaseUrl(){
  let url = String(state.supabaseUrl || DEFAULT_SUPABASE_URL).trim();
  if(!url) url = DEFAULT_SUPABASE_URL;
  url = url.replace(/\/+$/g, '');
  url = url.replace(/\/rest\/v1$/i, '');
  url = url.replace(/\/functions\/v1$/i, '');
  return url || DEFAULT_SUPABASE_URL;
}

function compactPromptText(s='', maxLen=260){
  return String(s).replace(/\s+/g, ' ').trim().slice(0, maxLen);
}

function getUpdatedReviewCount(){
  return Object.keys(state.reviewUpdatedNos || {}).length;
}

function buildReplacementPromptTemplate(groupQuestions, keptQuestions){
  const flaggedText = groupQuestions.map(q => {
    const note = (state.reviewNotes[String(q.no)] || '').trim();
    return [
      `Slot ${q.no}`,
      `Current English question: ${compactPromptText(q.question_en, 360)}`,
      `Current Japanese question: ${compactPromptText(q.question_ja, 360)}`,
      `Current correct answer: ${q.correct || ''}`,
      `Current supporting excerpt: ${compactPromptText(q.excerpt || '', 280)}`,
      `Mandatory reviewer instruction: ${note || 'Improve clarity, accuracy, natural wording, and fit to the source text.'}`,
    ].join('\n');
  }).join('\n\n');

  const keptText = keptQuestions.length
    ? keptQuestions.map(q => `- Slot ${q.no}: ${compactPromptText(q.question_en, 260)}`).join('\n')
    : '- None';

  return `You are revising selected questions in a bilingual veterinary textbook quiz.

Follow these rules strictly:
- Use only the provided source text as evidence.
- Do not use outside knowledge.
- Generate exactly {{questionCount}} replacement questions.
- Return the replacement questions in the same order as the flagged slots below.
- Set the "no" field of each returned item to the original slot number shown below.
- Keep the output bilingual in English and Japanese.
- Keep the output schema exactly.
- Do not duplicate the remaining kept questions listed below.
- Treat each mandatory reviewer instruction below as a hard requirement.
- If a reviewer instruction conflicts with the current question, rewrite the question so that the instruction is satisfied.
- Do not create questions from reference lists, bibliography entries, author lists, acknowledgments, client information, further reading lists, or citation-only material.
- If the current question appears to be based on citation-only material or a reference list, replace it with a new question based on substantive textbook prose from the source text.
- The question stem should ask what is correct/appropriate, not "which matches the text".
- Questions must read like standalone exam items, not like reading-comprehension questions about a chapter or passage.
- Never mention the chapter, text, textbook, excerpt, passage, source text, 本文, 抜粋文, この章, このチャプター, この教科書, or このテキスト in the question stem or explanation.
- Before finalizing each question, rewrite any text-referential wording into a general-knowledge wording.
- Make distractors genuinely competitive:
  - Each incorrect option should sound plausible to a learner with partial understanding.
  - Keep all four options in the same domain, same level of specificity, and similar length/tone.
  - Avoid absurd, opposite, unrelated, or giveaway distractors.
  - Avoid options that can be ruled out instantly because they are too broad, too narrow, or grammatically mismatched.
  - Prefer nuanced distinctions in mechanism, indication, interpretation, timing, severity, definition, or comparative appropriateness.
- Avoid obvious giveaway wording such as "always", "never", "only", "exclusively", "不要", "常に", and "十分である".
- Include a brief explanation in English and Japanese.
- Include brief choice-by-choice explanations in English and Japanese for options A, B, C, and D, explaining why the correct answer is correct and why each incorrect option is not the best answer.
- Include a short supporting excerpt copied or lightly trimmed from the source text.
- Return JSON only.

Flagged slots to replace:
${flaggedText}

Remaining kept questions to avoid duplicating:
${keptText}

Source text:
"""{{sourceText}}"""`;
}

function getSlugFromQuery(){
  const p = new URLSearchParams(location.search);
  return p.get('quiz');

async function supabaseRequest(path, {method='GET', body=null, prefer=''}={}){
  const headers = {
    'apikey': state.supabaseKey,
  };

  if(state.mode === 'builder'){
    const accessToken = await getBuilderAccessToken();
    if(!accessToken) throw new Error('Builderを使うには先にログインしてください。');
    headers['Authorization'] = 'Bearer ' + accessToken;
  }else{
    headers['Authorization'] = 'Bearer ' + state.supabaseKey;
  }

  if(body !== null) headers['Content-Type'] = 'application/json';
  if(prefer) headers['Prefer'] = prefer;
  const baseUrl = getSupabaseBaseUrl();
  let res;
  try{
    res = await fetch(baseUrl + path, { method, headers, body: body !== null ? JSON.stringify(body) : undefined });
  }catch(err){
    throw new Error(`Supabaseに接続できませんでした。URL設定またはネットワークを確認してください。 (${baseUrl})`);
  }
  if(!res.ok){
    const text = await res.text();
    throw new Error(`Supabase error ${res.status}: ${text}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function findAvailableSlug(baseSlug){
  const base = baseSlug || slugify(state.title) || 'quiz';
  const query = `/rest/v1/quizzes?select=slug&or=(slug.eq.${encodeURIComponent(base)},slug.like.${encodeURIComponent(base + '-%')})`;
  const existing = await supabaseRequest(query, {method:'GET'});
  const slugs = new Set((existing || []).map(x => x.slug));
  if(!slugs.has(base)) return base;
  let n = 2;
  while(slugs.has(`${base}-${n}`)) n++;
  return `${base}-${n}`;
}

async function saveQuizToSupabase({autoSlug = false, language = 'en'} = {}){
  if(!state.questions.length) throw new Error('先にクイズを生成してください。');

  const languageSuffix = language === 'ja' ? 'ja' : 'en';
  const baseSlugCore = slugify(state.title) || 'quiz';
  let slug = autoSlug
    ? `${baseSlugCore}-${languageSuffix}`
    : (state.slug || `${baseSlugCore}-${languageSuffix}`);

  if(!slug) throw new Error('タイトルを入力してください。');

  if(autoSlug){
    slug = await findAvailableSlug(slug);
  } else {
    const existing = await supabaseRequest(`/rest/v1/quizzes?slug=eq.${encodeURIComponent(slug)}&select=id`, {method:'GET'});
    if(Array.isArray(existing) && existing.length > 0) throw new Error('この slug はすでに存在します。別の slug にしてください。');
  }

  const payload = {
    slug,
    title: state.title,
    description: state.description,
    quiz_data: {
      title: state.title,
      description: state.description,
      language,
      shuffleQuestions: state.shuffleQuestions,
      shuffleChoices: state.shuffleChoices,
      questions: state.questions,
    }
  };

  await supabaseRequest('/rest/v1/quizzes', {method:'POST', body: payload});
  state.slug = slug;
  const link = `${location.origin}${location.pathname}?quiz=${encodeURIComponent(slug)}`;
  state.shareLink = link;
  state.shareLinks[language] = link;
}

async function loadQuizFromSupabase(slug){
  const data = await supabaseRequest(`/rest/v1/quizzes?slug=eq.${encodeURIComponent(slug)}&select=slug,title,description,quiz_data`);
  if(!Array.isArray(data) || data.length === 0) throw new Error('指定されたクイズが見つかりませんでした。');
  const row = data[0];
  const qd = row.quiz_data || {};
  state.mode = 'solver';
  state.title = qd.title || row.title || 'Quiz';
  state.description = qd.description || row.description || '';
  state.slug = row.slug;
  state.questions = Array.isArray(qd.questions) ? qd.questions : [];
  state.shuffleQuestions = !!qd.shuffleQuestions;
  state.shuffleChoices = !!qd.shuffleChoices;
  resetRendered();
}

async function refreshQuizList(){
  if(state.mode === 'builder' && !state.authUser){
    state.quizList = [];
    state.listStatus = '';
    return;
  }
  state.listStatus = '一覧を読み込み中です...';
  render();
  try{
    const data = await supabaseRequest('/rest/v1/quizzes?select=slug,title,description,created_at&order=created_at.desc');
    state.quizList = Array.isArray(data) ? data : [];
    state.listStatus = `${state.quizList.length}件のクイズを読み込みました。`;
    render();
  }catch(e){
    state.listStatus = e.message || '一覧の読み込みに失敗しました。';
    render();
  }
}

function getFilteredSortedQuizList(){
  const needle = (state.listSearch || '').trim().toLowerCase();

  let items = state.quizList.filter(item=>{
    const meta = getQuizMeta(item.slug);
    if(!state.showHidden && meta.hidden) return false;
    if(!needle) return true;
    const haystack = `${item.title || ''}
${item.slug || ''}
${item.description || ''}`.toLowerCase();
    return haystack.includes(needle);
  });

  items.sort((a,b)=>{
    if(state.listSort === 'created_asc'){
      return new Date(a.created_at || 0) - new Date(b.created_at || 0);
    }
    if(state.listSort === 'title_asc'){
      return String(a.title || '').localeCompare(String(b.title || ''), 'ja');
    }
    if(state.listSort === 'title_desc'){
      return String(b.title || '').localeCompare(String(a.title || ''), 'ja');
    }
    return new Date(b.created_at || 0) - new Date(a.created_at || 0);
  });

  return items;
}

function buildQuizPublicLink(slug){
  return `${location.origin}${location.pathname}?quiz=${encodeURIComponent(slug || '')}`;
}

function normalizeClipboardCell(value){
  return String(value || '').replace(/\t/g, ' ').replace(/\r?\n+/g, ' / ').trim();
}

function buildVisibleQuizListTsv(){
  const items = getFilteredSortedQuizList().filter(item=>{
    const meta = getQuizMeta(item.slug);
    return !meta.hidden;
  });
  const header = ['title', 'description', 'url'];
  const rows = items.map(item=>[
    normalizeClipboardCell(item.title || ''),
    normalizeClipboardCell(item.description || ''),
    buildQuizPublicLink(item.slug || ''),
  ]);
  return [header, ...rows].map(cols=>cols.join('\t')).join('\n');
}

function buildSingleQuizCopyText(slug){
  const item = state.quizList.find(x=>x.slug === slug);
  if(!item) return '';
  return [
    `Title: ${item.title || ''}`,
    `Description: ${item.description || ''}`,
    `URL: ${buildQuizPublicLink(item.slug || '')}`,
  ].join('\n');
}

            <div style="margin-top:8px;">

          <div class="btns" style="margin-top:0;">
            <a class="buttonlink ghost" href="${escapeHtml(link)}" target="_blank" rel="noreferrer">Open</a>
            <button class="secondary copy-list-link" data-link="${escapeHtml(link)}">Copy link</button>

async function callGenerateQuizChunk(chunkText, questionCount, title, overrides={}){
  const functionUrl = `${getSupabaseBaseUrl()}/functions/v1/generate_quiz`;
  const accessToken = await getBuilderAccessToken();
  if(!accessToken) throw new Error('AI作問を使うには先にログインしてください。');

  let res;
  try{
    res = await fetch(functionUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': state.supabaseKey,
        'Authorization': 'Bearer ' + accessToken,
      },
      body: JSON.stringify({
        sourceText: chunkText,
        questionCount,
        title,
        systemPrompt: overrides.systemPrompt || state.systemPrompt,
        promptTemplate: overrides.promptTemplate || state.promptTemplate,
      }),
    });
  }catch(err){
    throw new Error(`AI作問APIに接続できませんでした。Supabase URL、Edge Function、またはネットワークを確認してください。 (${functionUrl})`);
  }

  const json = await res.json().catch(()=> ({}));
  if(!res.ok){
    throw new Error(json.detail ? JSON.stringify(json.detail) : (json.error || `AI作問に失敗しました (${res.status})`));
  }
  return json;
}

async function generateQuizWithAI(){
  const rawSourceText = state.sourceText.trim();
  if(!rawSourceText) throw new Error('教科書本文を入力してください。');

  if(state.questionCountMode === 'auto'){
    applyAutoQuestionCount({ force: true });
  }

  const sourceText = preprocessSourceText(rawSourceText);
  if(!sourceText) throw new Error('有効な本文が見つかりませんでした。参考文献や付帯情報ではない本文を入力してください。');

  const removedChars = rawSourceText.length - sourceText.length;
  if (removedChars > 0) {
    state.aiStatus = `参考文献や付帯情報と思われる部分を自動除外しました。${removedChars}文字を除外して作問します...`;
    render();
  }

  const useChunking = sourceText.length > 12000 || Number(state.questionCount) > 10;
  let allQuestions = [];

  if (!useChunking) {
    const json = await callGenerateQuizChunk(
      sourceText,
      Number(state.questionCount || 10),
      state.title || 'Generated Quiz'
    );
    allQuestions = (Array.isArray(json.questions) ? json.questions : []).map(q => ({ ...q, _sourceChunk: sourceText }));
    state.aiStatus = 'AI作問が完了しました。レビューしてから保存できます。';
  } else {
    const chunks = splitSourceIntoChunks(sourceText, Number(state.questionCount || 10));
    const allocations = allocateQuestions(Number(state.questionCount || 10), chunks);

    state.aiStatus = `長文モードで分割生成しています... 0 / ${chunks.length}`;
    render();

    for (let i = 0; i < chunks.length; i++) {
      const qCount = allocations[i];
      state.aiStatus = `長文モードで分割生成しています... ${i + 1} / ${chunks.length}`;
      render();

      const json = await callGenerateQuizChunk(
        chunks[i],
        qCount,
        `${state.title || 'Generated Quiz'} (part ${i + 1})`
      );

      const partQuestions = Array.isArray(json.questions) ? json.questions : [];
      allQuestions.push(...partQuestions.map(q => ({ ...q, _sourceChunk: chunks[i] })));
    }

    allQuestions = allQuestions.slice(0, Number(state.questionCount || 10));
    state.aiStatus = `長文モードでのAI作問が完了しました。${chunks.length}分割を結合しました。レビューしてから保存できます。`;
  }

  allQuestions = allQuestions.map((q, i) => ({ ...q, no: i + 1 }));

  state.previewQuestions = allQuestions;
  state.questions = [];
  state.shareLink = '';
  state.shareLinks = { en: '', ja: '' };
  state.status = '生成された問題をレビューしてください。レビュー後に英語版URLと日本語版URLをそれぞれ作れます。';
  state.reviewStatus = '';
  state.reviewError = '';
  clearReviewSelections();
  state.generatedEnTsv = makeTsvEnFromQuestions(allQuestions);
  state.generatedJaTsv = makeTsvJaFromQuestions(allQuestions);
  state.aiError = '';
  saveLocal();
}

async function regenerateSingleQuestion(no){
  if(!state.previewQuestions.length) throw new Error('先にクイズを生成してください。');

  const targetNo = Number(no);
  if(!Number.isFinite(targetNo)) throw new Error('作り直す問題番号を認識できませんでした。');

  const original = state.previewQuestions.find(q => Number(q.no) === targetNo);
  if(!original) throw new Error('指定した問題が見つかりませんでした。');

  const chunkText = original._sourceChunk || state.sourceText.trim();
  const cleanedChunkText = preprocessSourceText(chunkText);
  const keptQuestions = state.previewQuestions.filter(q => (q._sourceChunk || state.sourceText.trim()) === chunkText && Number(q.no) !== targetNo);
  const promptTemplate = buildReplacementPromptTemplate([original], keptQuestions);

  state.reviewBusyNo = targetNo;
  state.reviewError = '';
  state.reviewStatus = `Q${targetNo} を作り直しています...`;
  render();

  try{
    const json = await callGenerateQuizChunk(
      cleanedChunkText || chunkText,
      1,
      `${state.title || 'Generated Quiz'} revision`,
      { promptTemplate }
    );

    const candidate = (Array.isArray(json.questions) ? json.questions[0] : null) || {};
    const replacement = {
      ...candidate,
      no: original.no,
      _sourceChunk: cleanedChunkText || chunkText,
    };

    state.previewQuestions = state.previewQuestions
      .map(q => Number(q.no) === targetNo ? replacement : q)
      .sort((a,b)=>a.no-b.no);

    state.reviewUpdatedNos[String(targetNo)] = (state.reviewUpdatedNos[String(targetNo)] || 0) + 1;
    state.generatedEnTsv = makeTsvEnFromQuestions(state.previewQuestions);
    state.generatedJaTsv = makeTsvJaFromQuestions(state.previewQuestions);
    state.reviewStatus = `Q${targetNo} を作り直しました。レビューを続けるか、英語版URLまたは日本語版URLを作成できます。`;
    state.reviewError = '';
    state.shareLink = '';
    state.shareLinks = { en: '', ja: '' };
  } finally {
    state.reviewBusyNo = null;
    render();
  }
}

async function saveReviewedQuiz(language='en'){
  if(!state.previewQuestions.length) throw new Error('先にクイズを生成してください。');

  state.aiError = '';
  state.error = '';
  state.questions = buildQuizQuestionsForLanguage(state.previewQuestions, language);
  state.status = `${language === 'ja' ? '日本語版' : 'English版'}の保存を準備しました。`;

  state.status = `Supabaseへ${language === 'ja' ? '日本語版' : 'English版'}を保存中です...`;
  render();

  await saveQuizToSupabase({autoSlug: true, language});
  await refreshQuizList();

  state.status = `${language === 'ja' ? '日本語版' : 'English版'}のURLを作成しました。必要ならもう一方の言語も同じレビュー結果から保存できます。`;
  saveLocal();
  render();
}

          <select id="listSort">
            <option value="created_desc" ${state.listSort === 'created_desc' ? 'selected' : ''}>作成日が新しい順</option>
            <option value="created_asc" ${state.listSort === 'created_asc' ? 'selected' : ''}>作成日が古い順</option>
            <option value="title_asc" ${state.listSort === 'title_asc' ? 'selected' : ''}>タイトル昇順</option>
            <option value="title_desc" ${state.listSort === 'title_desc' ? 'selected' : ''}>タイトル降順</option>
          </select>
        </div>
      </div>

      <div class="btns">
        <label class="small" style="display:flex;align-items:center;gap:8px;margin:0;">
          <input id="showHidden" type="checkbox" ${state.showHidden ? 'checked' : ''}>
          非表示のクイズも表示する
        </label>
      </div>

      <div class="alert info" style="margin-top:12px;">Copy visible list は、現在の検索・並べ替えを反映しつつ、非表示のクイズを除いた title / description / url のTSV形式でコピーします。各行の Copy details は、そのクイズ1件分のタイトル・説明・URLをコピーします。</div>
      <div class="alert info" style="margin-top:12px;">出題済みと非表示の状態は、このブラウザの localStorage に保存されます。</div>
      ${state.listStatus ? `<div class="alert info" style="margin-top:12px;">${escapeHtml(state.listStatus)}</div>` : ''}
      <div style="margin-top:12px;">${listRowsHtml()}</div>
    </div>
  `;

  const signOutBtn = document.getElementById('signOutBtn');
  if(signOutBtn){
    signOutBtn.onclick = async ()=>{
      try{
        await signOutBuilder();
        render();
      }catch(e){
        state.authError = e.message || 'ログアウトに失敗しました。';
        render();
      }
    };
  }

  ['title','description','systemPrompt','promptTemplate','listSearch'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('input', e=>{
      state[id] = e.target.value;
      saveLocal();
      if(id === 'listSearch') render();
    });
  });

  document.getElementById('questionCount').addEventListener('input', e=>{
    state.questionCount = clampNumber(Number(e.target.value || 10), 1, 20);
    state.questionCountMode = 'manual';
    saveLocal();
    render();
  });

  document.getElementById('recalcQuestionCountBtn').onclick = ()=>{
    state.questionCountMode = 'auto';
    applyAutoQuestionCount({ force: true });
    saveLocal();
    render();
  };

  document.getElementById('listSort').addEventListener('change', e=>{
    state.listSort = e.target.value;
    saveLocal();
    render();
  });

  document.getElementById('showHidden').addEventListener('change', e=>{
    state.showHidden = e.target.checked;
    saveLocal();
    render();
  });

  const sourceTextEl = document.getElementById('sourceText');
  if(sourceTextEl){
    sourceTextEl.addEventListener('input', e=>{
      state.sourceText = e.target.value;
      applyAutoQuestionCount({ syncDom: true });
      saveLocal();
    });
    sourceTextEl.addEventListener('change', ()=>{
      render();
    });
  }

  document.getElementById('shuffleQ').addEventListener('change', e=>{ state.shuffleQuestions = e.target.checked; saveLocal(); });
  document.getElementById('shuffleC').addEventListener('change', e=>{ state.shuffleChoices = e.target.checked; saveLocal(); });

  document.getElementById('resetPromptBtn').onclick = ()=>{
    state.systemPrompt = DEFAULT_SYSTEM_PROMPT;
    state.promptTemplate = DEFAULT_PROMPT_TEMPLATE;
    state.promptMode = 'default';
    state.aiStatus = 'プロンプトを初期設定に戻しました。';
    state.aiError = '';
    saveLocal();
    render();
  };

  document.getElementById('clearBuilderBtn').onclick = ()=>{
    clearBuilderVolatileState();
    saveLocal();
    render();
  };

  document.getElementById('aiGenerateReviewBtn').onclick = async ()=>{
    try{
      state.aiError = '';
      state.error = '';
      state.shareLink = '';
      state.shareLinks = { en: '', ja: '' };
      state.aiStatus = 'AIで作問中です...';
      state.reviewStatus = '';
      state.reviewError = '';
      render();
      await generateQuizWithAI();
      render();
    }catch(e){
      state.aiStatus = '';
      state.aiError = e.message || 'AI作問に失敗しました。';
      render();
    }
  };

  const saveReviewedQuizEnBtn = document.getElementById('saveReviewedQuizEnBtn');
  if(saveReviewedQuizEnBtn){
    saveReviewedQuizEnBtn.onclick = async ()=>{
      try{
        await saveReviewedQuiz('en');
      }catch(e){
        state.status = '';
        state.error = e.message || 'English版の保存に失敗しました。';
        render();
      }
    };
  }

  const saveReviewedQuizJaBtn = document.getElementById('saveReviewedQuizJaBtn');
  if(saveReviewedQuizJaBtn){
    saveReviewedQuizJaBtn.onclick = async ()=>{
      try{
        await saveReviewedQuiz('ja');
      }catch(e){
        state.status = '';
        state.error = e.message || '日本語版の保存に失敗しました。';
        render();
      }
    };
  }

  document.querySelectorAll('.regenerate-one-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        const no = Number(btn.dataset.no || '');
        await regenerateSingleQuestion(no);
      }catch(e){
        state.reviewStatus = '';
        state.reviewError = e.message || '問題の作り直しに失敗しました。';
        state.reviewBusyNo = null;
        render();
      }
    };
  });

  document.querySelectorAll('.review-note').forEach(el=>{
    el.addEventListener('input', e=>{
      state.reviewNotes[e.target.dataset.no || ''] = e.target.value;
    });
  });

  document.getElementById('refreshListBtn').onclick = refreshQuizList;

  const copyVisibleListBtn = document.getElementById('copyVisibleListBtn');
  if(copyVisibleListBtn){
    copyVisibleListBtn.onclick = async ()=>{
      try{
        const text = buildVisibleQuizListTsv();
        await navigator.clipboard.writeText(text);
        const original = copyVisibleListBtn.textContent;
        copyVisibleListBtn.textContent = 'Copied';
        setTimeout(()=> copyVisibleListBtn.textContent = original, 1200);
      }catch(e){}
    };
  }

  document.querySelectorAll('.copy-list-link').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(btn.dataset.link || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(()=> btn.textContent = original, 1200);
      }catch(e){}
    };
  });

  document.querySelectorAll('.copy-quiz-details-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        const text = buildSingleQuizCopyText(btn.dataset.slug || '');
        if(!text) return;
        await navigator.clipboard.writeText(text);
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(()=> btn.textContent = original, 1200);
      }catch(e){}
    };
  });

  document.querySelectorAll('.toggle-used').forEach(el=>{
    el.addEventListener('change', e=>{
      setQuizMeta(e.target.dataset.slug || '', { used: e.target.checked });
      render();
    });
  });

  document.querySelectorAll('.toggle-hidden').forEach(el=>{
    el.addEventListener('change', e=>{
      setQuizMeta(e.target.dataset.slug || '', { hidden: e.target.checked });
      render();
    });
  });

  document.querySelectorAll('.copy-share-link').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(btn.dataset.link || '');
        const original = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(()=> btn.textContent = original, 1400);
      }catch(e){}
    };
  });

}

(async function init(){
  loadLocal();
  loadQuizMeta();
  const quizSlug = getSlugFromQuery();
  if(quizSlug){
    try{
      state.mode = 'solver';
      await loadQuizFromSupabase(quizSlug);
    }catch(e){
      state.mode = 'builder';
      clearBuilderVolatileState();
      state.error = e.message || 'クイズの読み込みに失敗しました。';
      attachBuilderAuthListener();
      await syncBuilderAuthState();
      if(state.authUser){
        try{ await refreshQuizList(); }catch(_){}
      }
    }
  }else{
    state.mode = 'builder';
    clearBuilderVolatileState();
    attachBuilderAuthListener();
    await syncBuilderAuthState();
    if(state.authUser){
      try{ await refreshQuizList(); }catch(_){}
    }
  }
  render();
})();
</script>
</body>
</html>
